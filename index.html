            } else {
                box.classList.add('hidden');
                txt.innerText = "חשוף תשובת מודל ומחוון בדיקה";
            }
        }

        function renderDashboardAnalytics(container) {
            const inlineMastered = Object.keys(masteredCheckpoints).filter(k => masteredCheckpoints[k] === true).length;
            const flashcardMastered = Object.keys(cardMasteredState).filter(k => cardMasteredState[k] === true).length;
            
            let totalCheckpoints = 0;
            for (let lId in lessonsData) {
                totalCheckpoints += lessonsData[lId].concepts.length;
            }

            let quizCorrect = 0;
            let quizTotal = 0;
            mcQuestions.forEach((q, idx) => {
                if (quizAnswers[idx] !== undefined) {
                    quizTotal++;
                    if (quizAnswers[idx] === q.answerIndex) quizCorrect++;
                }
            });

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="glass-card rounded-2xl p-6 border border-slate-800">
                        <h2 class="text-2xl font-extrabold text-white mb-2">מרכז שליטה וסטטיסטיקת למידה</h2>
                        <p class="text-sm text-slate-400 font-medium">נתח את קצב ההתקדמות שלך לקראת הבחינה</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Stat 1 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs md:text-sm font-bold text-slate-400 block">בחני הבנה (Inline)</span>
                            <span class="text-4xl font-extrabold text-cyan-400 font-tech block">${inlineMastered} / ${totalCheckpoints}</span>
                            <span class="text-[10px] md:text-xs text-slate-500 block">הושלמו מתוך חומר הלימוד</span>
                        </div>
                        <!-- Stat 2 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs md:text-sm font-bold text-slate-400 block">כרטיסיות ששוננו (Flashcards)</span>
                            <span class="text-4xl font-extrabold text-indigo-400 font-tech block">${flashcardMastered} / ${flashcardsData.length}</span>
                            <span class="text-[10px] md:text-xs text-slate-500 block">סומנו כ-'ידעתי מצוין'</span>
                        </div>
                        <!-- Stat 3 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs md:text-sm font-bold text-slate-400 block">סימולציית בחירה מרובה</span>
                            <span class="text-4xl font-extrabold text-emerald-400 font-tech block">${quizTotal > 0 ? Math.round((quizCorrect/quizTotal)*100) : 0}%</span>
                            <span class="text-[10px] md:text-xs text-slate-500 block">ציון ממוצע מתוך ${quizTotal} מענים</span>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl p-6 border border-slate-800 space-y-4">
                        <h3 class="font-bold text-white text-lg">הערכות סופיות למעבר המבחן:</h3>
                        <div class="space-y-3 text-sm md:text-base text-slate-300">
                            <p class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full ${inlineMastered >= 18 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>שליטה תיאורטית: <strong>${inlineMastered >= 18 ? 'מעולה' : 'נדרש פתרון של עוד בחנים מהירים בגוף החומר'}</strong></span>
                            </p>
                            <p class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full ${flashcardMastered >= 18 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>שינון מושגי יסוד: <strong>${flashcardMastered >= 18 ? 'מוכן למבחן' : 'עבור שוב על כרטיסיות השינון שסומנו לחזרה'}</strong></span>
                            </p>
                            <p class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full ${quizCorrect >= 30 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>יכולת ניתוח קייסים: <strong>${quizCorrect >= 30 ? 'טובה מאוד' : 'פתור את סימולטור התרחישים וערוך השוואה קפדנית למחווני הניקוד'}</strong></span>
                            </p>
                        </div>
                        
                        <div class="border-t border-slate-800/80 pt-4 flex justify-between">
                            <button onclick="resetAllStudyState()" class="px-4 py-2.5 rounded-lg bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 text-rose-400 text-xs md:text-sm font-bold transition">
                                אפס את כל נתוני הלמידה
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function resetAllStudyState() {
            if (confirm('האם אתה בטוח שברצונך לאפס לחלוטין את כל התקדמות הלמידה שלך?')) {
                masteredCheckpoints = {};
                cardMasteredState = {};
                quizAnswers = {};
                tempCheckpointAnswers = {};
                scenarioDrafts = {};
                currentCardIndex = 0;
                currentQuizIndex = 0;
                currentOpenIndex = 0;
                currentTab = 'guide';
                currentLesson = 1;
                
                localStorage.removeItem('cyber_masteredCheckpoints');
                localStorage.removeItem('cyber_cardMasteredState');
                localStorage.removeItem('cyber_quizAnswers');
                localStorage.removeItem('cyber_scenarioDrafts');
                localStorage.removeItem('cyber_tempCheckpointAnswers');
                localStorage.removeItem('cyber_currentTab');
                localStorage.removeItem('cyber_currentLesson');
                localStorage.removeItem('cyber_hasSeenWelcomePop');
                
                changeActiveTab('guide');
                selectLesson(1);
                
                updateHUD();
                renderCurrentView();
                showToast('כל ההתקדמות אופסה בהצלחה');
            }
        }
    </script>

    <!-- Sound & Toast Systems -->
    <script>
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('sound-on-svg').classList.toggle('hidden', isMuted);
            document.getElementById('sound-off-svg').classList.toggle('hidden', !isMuted);
            showToast(isMuted ? 'הסאונד הושתק' : 'הסאונד הופעל');
        }

        function playChimeSound() {
            if (isMuted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.log("Audio Context blocked", e);
            }
        }

        function showToast(msg) {
            const bar = document.getElementById('toast-bar');
            bar.innerText = msg;
            bar.classList.remove('translate-y-10', 'opacity-0');
            
            setTimeout(() => {
                bar.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }
    </script>

    <!-- POMODORO TIMER SYSTEM -->
    <script>
        let timerSec = 3000;
        let timerMax = 3000;
        let timerRunning = false;
        let timerInt = null;

        function updateTimerUI() {
            const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
            const s = (timerSec % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').innerText = `${m}:${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-play-btn');
            if (timerRunning) {
                clearInterval(timerInt);
                timerRunning = false;
                btn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                    <span>הפעל</span>
                `;
                showToast('הטיימר הושהה');
            } else {
                timerRunning = true;
                btn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>השהה</span>
                `;
                showToast('הטיימר הופעל');
                
                timerInt = setInterval(() => {
                    if (timerSec > 0) {
                        timerSec--;
                        updateTimerUI();
                    } else {
                        clearInterval(timerInt);
                        timerRunning = false;
                        playChimeSound();
                        showToast('סבב פומודורו הושלם בהצלחה!');
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInt);
            timerRunning = false;
            timerSec = timerMax;
            updateTimerUI();
            
            const btn = document.getElementById('timer-play-btn');
            btn.innerHTML = `
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                <span>הפעל</span>
            `;
        }

        updateTimerUI();
    </script>
