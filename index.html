        }

            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;

        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

            transform: rotateY(180deg);

        .flipped {

    <script>
        const lessonsData = {"1": {"title": "שיעור 1: מבוא, IT לעומת OT וניהול סיכונים", "introduction": "הבנת גבולות עולם אירועי הסייבר, המאפיינים הייחודיים של מערכות הבקרה המפעילות את התשתית הפיזית במדינה, ומתודולוגיית היסוד של זיהוי סיכונים, הגדרת נכסי מפתח וטיפול בהם.", "concepts": [{"title": "1. דילמת הניהול ומשולש CIA", "text": "אירוע סייבר מוגדר כאירוע בעל פוטנציאל השפעה עסקי, משפטי או רגולטורי. **דילמת הניהול (Management Dilemma)** מציגה קונפליקט מובנה בזמן אירוע פעיל: צוות האבטחה רוצה להשבית מערכות כדי לעצור את התפשטות התקיפה ולבצע חקירה פורנזית, בעוד שההנהלה רוצה להשאירן פעילות כדי להמשכיות עסקית. אבטחת מידע נשענת על משולש **CIA: Confidentiality (סודיות), Integrity (שלמות), Availability (זמינות)**.", "examinerTip": "בבחינה, מול דילמת הניהול יש להסביר שהחלטה על השבתה צריכה להתקבל ברמת הנהלה על בסיס חישוב סיכון עסקי ולא כהחלטה טכנית בלבד.", "checkpoint": {"id": "l1_c1", "question": "מי מוסמך לקבל את ההחלטה על השבתת שרתי הייצור בארגון בעת אירוע סייבר פעיל?", "options": ["אנליסט ה-SOC שמזהה את ההתראה לראשונה.", "מנהל ה-IT בלבד.", "הנהלת הארגון הבכירה (המנכ\"ל וההנהלה העסקית) על בסיס שקלול סיכון עסקי.", "ספק ה-EDR החיצוני."], "correct": 2, "explanation": "ההחלטה להשבית מערכות קריטיות היא החלטה עסקית בעלת משמעות רחבה (אובדן הכנסות, פגיעה במוניטין) ולכן צריכה להתקבל על ידי ההנהלה הבכירה."}}, {"title": "2. תשתיות קריטיות: IT לעומת OT", "text": "מערכות מחולקות לשני דומיינים: **IT (Information Technology)** - מערכות מידע, מחשבים ושרתים עסקיים, בהם הדגש העיקרי הוא סודיות (Confidentiality). **OT (Operational Technology)** - מערכות בקרה תעשייתיות (ICS/SCADA) המפעילות תשתיות פיזיות (חשמל, מים, רכבות), בהן הדגש הוא זמינות (Availability) ובטיחות פיזית של חיי אדם.", "image": "assets/it_vs_ot_diagram.png", "examinerTip": "בשאלה השוואתית בין IT ל-OT, זכור ששיבוש בקר OT (למשל, שינוי קלט בבקר מים Stuxnet) עלול לגרום לנזק פיזי קטסטרופלי ולכן שלמות וזמינות קודמות לסודיות.", "checkpoint": {"id": "l1_c2", "question": "מהו סדר העדיפויות הטיפוסי של משולש ה-CIA במערכות בקרה תעשייתיות (OT)?", "options": ["סודיות, שלמות, זמינות (C-I-A)", "זמינות, שלמות, סודיות (A-I-C)", "סודיות, זמינות, שלמות (C-A-I)", "שלמות, סודיות, זמינות (I-C-A)"], "correct": 1, "explanation": "ב-OT העדיפות העליונה היא זמינות (Availability) כדי למנוע קריסת תשתיות קריטיות ופגיעה בחיי אדם, לאחר מכן שלמות (Integrity) ורק לבסוף סודיות."}}]}, "2": {"title": "שיעור 2: גבולות הארגון, תשתיות קריטיות ועדכונים", "introduction": "התפתחות גבולות הרשת הארגונית, האתגרים הנובעים מחיבור רכיבי ענן, מכשירים אישיים (BYOD) ו-IoT, והמורכבות הגבוהה של ניהול פגיעות ועדכונים (Patch Management).", "concepts": [{"title": "1. אבולוציית הרשת וסגמנטציה", "text": "בעידן המודרני גבולות הרשת היטשטשו (Borders without IT) עקב שימוש ב-BYOD, ענן ובינה מלאכותית. הגנה נעשית באמצעות **סגמנטציה (Segmentation)** - הפרדת רשתות בעזרת חומות אש (Firewalls). מודל 3 השכבות כולל: **Presentation (תצוגה)**, **Application (לוגיקה)**, ו-**Database (בסיס נתונים)**. סגמנטציה מונעת גישה ישירה משכבת התצוגה לבסיס הנתונים.", "examinerTip": "הסבר בבחינה שסגמנטציה מונעת מתוקף שפרץ לשכבה החיצונית (תצוגה) לבצע תנועה לטרלית ישירה לבסיס הנתונים ללא מעבר בחומות אש מנטרות.", "checkpoint": {"id": "l2_c1", "question": "כיצד סגמנטציה תורמת להגנה במודל 3 השכבות?", "options": ["היא מונעת מהמשתמש לגשת לאתר האינטרנט.", "היא מחייבת מעבר דרך חומות אש (Firewalls) המפרידות בין שכבות התצוגה, האפליקציה ובסיס הנתונים.", "היא מריצה בדיקות SAST אוטומטיות על קוד המקור.", "היא מבטלת את הצורך בכתובות IP."], "correct": 1, "explanation": "סגמנטציה מקימה חומות אש בין השכבות השונות, כך שלא ניתן לגשת ישירות לבסיס הנתונים משכבת התצוגה מבלי לעבור בדיקות וסינון."}}, {"title": "2. ניהול עדכונים: Zero-Day לעומת One-Day", "text": "**Zero-Day** הוא באג שטרם התגלה ליצרן, ולכן אין לו תיקון זמין. **One-Day** הוא באג שפורסם לו פאץ' (תיקון). מרוץ החימוש מתרחש ב-One-Day: תוקפים מנתחים את התיקון, מייצרים קוד ניצול וסורקים את הרשת באופן המוני. ארגונים מתקשים לעדכן מיידית עקב חשש מהשבתת מערכות, חוסר תאימות ויציבות.", "examinerTip": "בבחינה, הדגש שחלון ה-One-Day הוא המסוכן ביותר לארגון עקב פומביות החולשה ומהירות התקיפות האוטומטיות.", "checkpoint": {"id": "l2_c2", "question": "מדוע חלון הזמן של One-Day נחשב למסוכן ביותר לארגונים?", "options": ["מפני שהיצרן אינו מודע לפגיעות ולא שחרר שום פאץ'.", "מפני שחולשת האבטחה הפכה לפומבית והתוקפים סורקים ומנצלים אותה באופן אוטומטי, בעוד הארגון טרם הטמיע את התיקון.", "משום שהוא דורש החלפה פיזית של בקרים תעשייתיים.", "בגלל שימוש בסיסמאות ברירת מחדל של סימנס."], "correct": 1, "explanation": "מיד עם פרסום התיקון, הפגיעות ידועה לכל. תוקפים סורקים את הרשת באגרסיביות לאתר שרתים שלא הותקן בהם הפאץ', מה שמציב את הארגון בסיכון גבוה ביותר."}}]}, "3": {"title": "שיעור 3: הקשחת מערכות, SSDLC ומתקפות תודעה (CNI)", "introduction": "הבנת תהליך צמצום משטח התקיפה במערכות שונות, שילוב אבטחת מידע במחזור הפיתוח (SSDLC) והבנת איומי סייבר משפיעי תודעה.", "concepts": [{"title": "1. הקשחת מערכות (Hardening) וסנכרון NTP", "text": "הקשחה היא צמצום משטח התקיפה על ידי נטרול שירותים מיותרים והגדרות אבטחה קפדניות: ביטול כניסה אוטומטית (למעט עמדות בקרה קבועות או קופות), שינוי/חסימת סיסמת המנהל הדיפולטיבי (sa) בבסיסי נתונים, וסנכרון זמנים ב-**NTP (Network Time Protocol)** לצורך הצלבת לוגים ואחידות זמנים בחקירה.", "image": "assets/ssdlc_phases.png", "examinerTip": "בשאלה על תחקור אירועים, ציין שסנכרון שעונים באמצעות NTP הוא תנאי סף לבניית ציר זמן (Timeline) אמין בחקירה פורנזית.", "checkpoint": {"id": "l3_c1", "question": "מדוע סנכרון שעונים באמצעות פרוטוקול NTP הוא קריטי לתהליך ההקשחה והניטור הארגוני?", "options": ["הוא מונע מתקפות SQL Injection.", "הוא מאפשר הצלבת לוגים תקינה ובניית ציר זמן אחיד של האירוע בעת חקירה פורנזית של מערכות שונות.", "הוא מחליף את מנגנוני ה-WAF הארגוניים.", "הוא מאפשר למחוק את הלוגים הישנים באופן אוטומטי."], "correct": 1, "explanation": "ללא סנכרון NTP, השעונים במכשירי הרשת השונים יציגו זמנים שונים, מה שיהפוך את מלאכת הצלבת הלוגים והתחקור לבלתי אפשרית."}}, {"title": "2. פיתוח מאובטח (SSDLC) ומתקפות CNI", "text": "**SSDLC** משלב אבטחה בכל שלב: Threat Modeling בעיצוב, סריקת קוד סטטית (**SAST**) בפיתוח, ובדיקות תקינות קלט (Input Validation) למניעת הזרקות קוד. בנוסף, נלמד מושג ה-**CNI (Computer Network Influence)** - מתקפות תודעה והשפעה (כגון פייק ניוז), בניגוד לריגול (CNE) או הרס (CNA). מקרה בוחן **בינת תוכנה** מראה כי השארת שרת PoC ללא פיקוח הובילה לפגיעה תדמיתית קשה.", "examinerTip": "זכור את ההבדל: SAST בודק את קוד המקור ללא הרצה (שלב הפיתוח), בניגוד ל-DAST המריץ את האפליקציה (שלב הבדיקות).", "checkpoint": {"id": "l3_c2", "question": "איזה מונח מייצג שימוש ברשתות וברשתות חברתיות כדי להשפיע על התודעה והפצת פייק ניוז?", "options": ["CNA (Computer Network Attack)", "CNE (Computer Network Exploitation)", "CNI (Computer Network Influence)", "SSDLC"], "correct": 2, "explanation": "CNI (Computer Network Influence) עוסק בהשפעה על התודעה הציבורית, הפצת פייק ניוז והטיית דעות, להבדיל מתקיפה פיזית/דיגיטלית (CNA) או ריגול (CNE)."}}]}, "4": {"title": "שיעור 4: מודיעין סייבר, אנטומיית התקיפה (APT) והגנות מודרניות", "introduction": "הבנת שלבי התקיפה הממוקדת (APT), שימוש במסגרת העבודה של MITRE ATT&CK, ומנגנוני הגנת אימייל וגלישה מודרניים.", "concepts": [{"title": "1. אנטומיית תקיפה (APT Kill Chain)", "text": "מתקפת APT מורכבת מ-5 שלבים מרכזיים: \n1. **איסוף מידע (Reconnaissance)** - דליית פרטים על יעדים.\n2. **אחיזה ראשונית (Initial Compromise)** - חדירה ראשונית לארגון (למשל, פישינג).\n3. **תקשורת שליטה ובקרה (C2)** - ערוץ תקשורת מוצפן לשרת התוקף.\n4. **תנועה לטרלית (Lateral Movement)** - מעבר מתחנה לתחנה להשגת הרשאות גבוהות.\n5. **ביצוע המשימה (Mission Complete)** - ריגול (CNE) או הרס (CNA).", "image": "assets/kill_chain_steps.png", "examinerTip": "שנן את השלבים של ה-Kill Chain והצג אותם בבחינה באופן סדרתי כדי להראות הבנה של אבולוציית התקיפה הארגונית.", "checkpoint": {"id": "l4_c1", "question": "באיזה שלב של מתקפת ה-APT נמצא תוקף שמנסה לגנוב סיסמאות משרת אחד כדי לעבור לשרת בסיס הנתונים של הארגון?", "options": ["Reconnaissance (איסוף מידע)", "Initial Compromise (אחיזה ראשונית)", "Lateral Movement (תנועה לטרלית)", "Command & Control (C2)"], "correct": 2, "explanation": "תנועה לטרלית (Lateral Movement) היא מעבר של תוקף בתוך הרשת הפנימית מתחנה לתחנה לצורך השגת הרשאות והגעה ליעדים רגישים."}}, {"title": "2. הגנת אימייל ודוקטרינת Zero-Trust", "text": "למניעת זיוף אימייל (Spoofing) משתמשים בשלושה מנגנונים: **SPF** (רשימת IP מורשים ב-DNS), **DKIM** (חתימה קריפטוגרפית של התוכן), ו-**DMARC** (קביעת מדיניות טיפול בכישלונות). דוקטרינת **Zero-Trust (אמון אפס)** גורסת כי 'לעולם אל תסמוך, תמיד תאמת', ודורשת: אימות כפול (MFA), מכשיר מנוהל ומעודכן, והרשאה מינימלית (Least Privilege).", "examinerTip": "ההבדל בין SPF ל-DKIM הוא מפתח במבחן: SPF מאמת את שרת ה-IP השולח, בעוד DKIM מאמת את שלמות תוכן המייל קריפטוגרפית.", "checkpoint": {"id": "l4_c2", "question": "איזה מנגנון אבטחה יוודא שתוכן המייל לא שונה קריפטוגרפית במהלך המעבר ברשת?", "options": ["SPF", "DKIM", "DMARC", "Zero-Trust"], "correct": 1, "explanation": "DKIM (DomainKeys Identified Mail) משתמש בחתימה קריפטוגרפית כדי להבטיח את אמינות השולח ושלמות תוכן ההודעה במעבר."}}]}, "5": {"title": "שיעור 5: הגנת Endpoint, ניהול אירוע ומתקפות נפוצות", "introduction": "הבנת אבולוציית הכלים להגנת נקודות הקצה, הבחנה בין תקלה לאירוע סייבר, וקבלת ההחלטות הניהוליות והרגולטוריות באירוע.", "concepts": [{"title": "1. הגנת קצה: מאנטי-וירוס ל-EDR", "text": "הגנת נקודות קצה התפתחה משמעותית: \n- **זיהוי מבוסס חתימות (Signature)**: השוואת Hash מול מאגר קיים. לא מגן מ-Zero-day.\n- **זיהוי התנהגותי (Behavioral)**: ניטור פעולות בזמן אמת (כמו הצפנת קבצים המונית).\n- **EDR (Endpoint Detection & Response)**: כלי המשלב זיהוי התנהגותי, חסימה אוטומטית מקומית ואיסוף נתוני טלמטריה לענן לניתוח רוחבי.\n- **Application Whitelisting (בקרת אפליקציות)**: חסימת כלל התוכנות ברירת מחדל והתרת הרצה רק לקבצים שאושרו מראש. מעולה למערכות קבועות (SCADA, קופות, מכשור רפואי).", "examinerTip": "בבחינה, מול מערכת מוגבלת או בקרה תעשייתית ללא עדכונים, המלץ על בקרת אפליקציות (Application Whitelisting) כפתרון הקשחה מוביל.", "checkpoint": {"id": "l5_c1", "question": "איזה כלי אבטחה ימנע הרצת כל קובץ שאינו מופיע ברשימת האישורים המוגדרת מראש, ללא תלות בחתימות זדוניות?", "options": ["אנטי-וירוס מבוסס חתימות רגיל.", "בקרת אפליקציות (Application Whitelisting).", "מערכת ניתוח סטטי (SAST).", "מערכת IPS רשתית."], "correct": 1, "explanation": "Whitelisting חוסמת כל תוכנה כברירת מחדל ומאפשרת רק למה שאושר מראש לרוץ, מה שחוסם גם קבצי Zero-day חדשים."}}, {"title": "2. ניהול אירוע סייבר ודילמת ההכרזה", "text": "יש להבחין בין **תקלה תפעולית** (כשל חומרה) לבין **אירוע סייבר** (פעילות זדונית). **דילמת ההכרזה (Declaration Dilemma)** מתארת את כובד משקל ההחלטה להכריז על אירוע באופן רשמי עקב השלכות כספיות, חוקיות (חובת דיווח תוך 72 שעות לרשות להגנת הפרטיות) ודיווח מיידי לבורסה עבור חברה ציבורית.", "examinerTip": "הסבר במבחן שהכרזה על אירוע היא החלטה של ההנהלה הבכירה (סמנכ\"ל/מנכ\"ל) עקב השלכות רגולטוריות ומשפטיות רחבות, ולא החלטה טכנית של ה-IT.", "checkpoint": {"id": "l5_c2", "question": "מדוע הכרזה רשמית על אירוע סייבר היא החלטה ניהולית בכירה ולא החלטה של צוות ה-IT?", "options": ["משום שה-IT אינם מבינים בשרתים.", "עקב השלכות רגולטוריות (חובת דיווח לרשות להגנת הפרטיות תוך 72 שעות), משפטיות (חשש מתביעות) וצורך בניהול דוברות ויחסי ציבור.", "כי צוות ה-IT אינו מחזיק בהרשאות sa בבסיסי הנתונים.", "כדי למנוע הפעלת פלייבוקים ב-SOC."], "correct": 1, "explanation": "הכרזת אירוע מפעילה חובות דיווח חוקיות, סיכון תדמיתי וכלכלי כבד שאינם טכנולוגיים בלבד, ולכן מצריכים אישור הנהלה."}}]}, "6": {"title": "שיעור 6: מתקפות תקשורת, DDoS ו-WAF", "introduction": "הבנת מתקפות מניעת שירות מבוזרות בשכבות 3 ו-7, תפקיד ה-Stateful Packet Filtering, וההגנה האפליקטיבית באמצעות WAF.", "concepts": [{"title": "1. מתקפות DDoS: שכבה 3 לעומת שכבה 7", "text": "מתקפות DDoS נחלקות לשכבות: \n- **DDoS שכבה 3 (Network Layer)**: הצפת רוחב הפס בפקטות ריקות (כמו SYN Flood). המטרה היא להעמיס על מערכת ההפעלה. החסימה נעשית במקור אצל ה-ISP או שירותי סינון (Radware).\n- **DDoS שכבה 7 (Application Layer)**: בקשות HTTP GET/POST מורכבות שנראות לגיטימיות ומאלצות את האפליקציה לבצע עיבוד נתונים או שאילתות כבדות בבסיס הנתונים, מה שעלול להקריסה. חסימה נעשית באמצעות WAF או Cloudflare. מנגנון **TCP Handshake** כולל: SYN -> SYN-ACK -> ACK.", "examinerTip": "הדגש במבחן כי תקיפת DDoS שכבה 7 מורכבת ומסוכנת יותר לחסימה מפני שהיא מחקה התנהגות משתמשים לגיטימיים בפורט 80/443 פתוח.", "checkpoint": {"id": "l6_c1", "question": "מדוע מתקפת מניעת שירות בשכבה 7 (DDoS Layer 7) קשה יותר לחסימה מאשר בשכבה 3?", "options": ["משום שהיא משתמשת בפרוטוקול UDP שאינו דורש אישור.", "מכיוון שהיא מדמה בקשות אפליקטיביות (כמו HTTP GET) שנראות לגיטימיות לחלוטין ועוברות דרך הפורטים הפתוחים של האתר.", "מפני שהיא מתבצעת רק מתוך הרשת הפנימית של הארגון.", "כי היא אינה משפיעה על בסיס הנתונים."], "correct": 1, "explanation": "תעבורת שכבה 7 נראית כמו תעבורת גלישה רגילה, ולכן קשה מאוד לסנן אותה ללא ניתוח מעמיק של התנהגות המשתמש (WAF/Challenge)."}}, {"title": "2. הגנה אפליקטיבית (WAF) ומתקפות רשת", "text": "**WAF (Web Application Firewall)** מגן מפני 'תכנות גרוע' ומפעיל **מצב למידה (Learning Mode)** למיפוי קלטים וחסימת חריגות (SQLi). בנוסף, נלמדו מתקפות רשת: **VLAN Hopping** (דילוג רשתות), **ARP Poisoning** (הטיית תעבורה), ו-**DNS Hijacking** (הפניית גולשים לשרת זדוני). במערכות הפעלה ישנו סיכון של **DLL Hijacking** (ניצול סדר חיפוש הספריות), ומתקפות Fileless המכונות **Living off the Land** המשתמשות ב-PowerShell להרצת קוד ישירות בזיכרון.", "examinerTip": "הסבר כי WAF מגן בעיקר ברמת האפליקציה (כמו SQL Injection, XSS) בניגוד לפיירוול רגיל הבודק רק IP, פורט ופרוטוקול.", "checkpoint": {"id": "l6_c2", "question": "מהו תפקידו העיקרי של מצב למידה (Learning Mode) במערכת WAF?", "options": ["ללמד את מפתחי התוכנה כיצד לכתוב קוד מאובטח.", "ללמוד את דפוסי הקלטים וההתנהגות הלגיטימיים של המשתמשים באתר כדי לזהות ולחסום חריגות וניסיונות הזרקה.", "לסנכרן את זמני השרת מול ה-NTP הארגוני.", "לבצע סריקה קבועה של ספריות קוד פתוח."], "correct": 1, "explanation": "מצב הלמידה מאפשר ל-WAF לבנות פרופיל התנהגות של הממשקים ולחסום תעבורה חריגה (כגון הזרקת תווים מיוחדים לשדה שם המשתמש)."}}]}, "7": {"title": "שיעור 7: מערכות SIEM, SOC ובינה מלאכותית (AI)", "introduction": "הבנת תפקיד מערכות ה-SIEM בריכוז הלוגים, תהליך ה-Parsing, מבנה ה-SOC הארגוני, והטמעת יכולות Machine Learning.", "concepts": [{"title": "1. מערכת SIEM וארכוב לוגים", "text": "מערכת **SIEM** אוספת לוגים מכל תשתית הארגון. היא מבצעת **Parsing (פירמול)** - לקיחת לוג גולמי (Raw Log) לא קריא והפיכתו למידע מובנה בטבלה. על בסיס המידע המובנה, המערכת מריצה חוקי **קורלציה (Correlation)** - הצלבת אירועים ממקורות שונים (כמו כניסה כושלת ב-VPN ולאחר מכן ניסיון גישה ל-Database) כדי לזהות תקיפות מורכבות.", "examinerTip": "בבחינה, אם תישאל על זיהוי מתקפה רוחבית, הסבר שרק באמצעות Parsing וקורלציה ב-SIEM ניתן לקשר בין התראות בודדות במערכות שונות לכדי תמונת תקיפה אחת.", "checkpoint": {"id": "l7_c1", "question": "מהו תהליך ה-Parsing במערכת SIEM?", "options": ["הצפנת הלוגים כדי למנוע מהתוקף למחוק אותם.", "תרגום והמרת לוג גולמי (Raw Log) לפורמט מובנה וקריא הכולל שדות מוגדרים כמו זמן, יוזר, IP וחומרה.", "הפעלת פלייבוק תגובה אוטומטי ב-SOAR.", "מחיקת התראות שווא (False Positives)."], "correct": 1, "explanation": "Parsing הוא שלב הפירמול המאפשר למערכת לקרוא את הלוג הגולמי ולבצע עליו קורלציה ושאילתות בתוך מסד הנתונים."}}, {"title": "2. מבנה ה-SOC ושילוב בינה מלאכותית", "text": "ה-**SOC** מורכב מרמות: Level 1 (סטודנטים לניטור וסינון ראשוני לפי פלייבוקים), אנליסטים מנוסים, Threat Hunters (ציידי איומים פרואקטיביים) ומנהל SOC. מערכות חדישות משלבות **Machine Learning (ML)** ללמידת פרופיל התנהגות נורמלי (Behavioral Profiling) וחיזוי אנומליות, מה שמסייע בצמצום התראות שווא (False Positives).", "examinerTip": "זכור שפלייבוקים (Playbooks) הם שלבי העבודה המובנים של האנליסט ב-SOC לטיפול באירוע ספציפי (למשל, חקירת אימייל חשוד).", "checkpoint": {"id": "l7_c2", "question": "כיצד תורמת למידת מכונה (Machine Learning) לצמצום התראות שווא (False Positives) ב-SOC?", "options": ["היא מוחקת את כל האלרטים הקריטיים של ה-EDR.", "היא לומדת את ההתנהגות השגרתית בארגון ומזהה רק חריגות אמיתיות מהפרופיל המוכר, במקום להסתמך על חוקים נוקשים.", "היא מריצה סקריפטים לכיבוי המערכות באופן אוטומטי.", "היא מחליפה לחלוטין את מנהל ה-SOC."], "correct": 1, "explanation": "על ידי יצירת בנצ'מארק של התנהגות שגרתית (למשל, שעות עבודה, שרתי תקשורת רגילים), ה-ML יודע להתעלם מרעשי רקע ולהתריע רק על אנומליות אמיתיות."}}]}, "8": {"title": "שיעור 8: תכנון SIEM/SOC/SOAR, וקטור USB וניהול OT", "introduction": "אפיון דשבורד לניטור אירועים, חקר תקיפות מבוססות התקנים פיזיים (USB) והעמקת האבטחה במערכות בקרה תעשייתיות (OT).", "concepts": [{"title": "1. USB כאמצעי חדירה (מקרה REvil)", "text": "תקיפות רבות (כגון מתקפת כופרת REvil ב-2021) משתמשות בהתקני USB המכילים סקריפטים של PowerShell או קבצים חבויים העוקפים את מערכות הלבנת הקבצים (Sanitization) שאינן סורקות קבצי מערכת מוסתרים (Hidden Files). תוקפים משתמשים ב-**DLL Masking** - שינוי קל של שם קובץ הספרייה כדי להיראות לגיטימי (למשל svchostt.dll).", "examinerTip": "שים לב: מערכות הלבנת מדיה (Sanitization) חייבות להיקבע לסרוק את כלל הקבצים, כולל קבצים חבויים וספריות מערכת, כדי למנוע עקיפה זו.", "checkpoint": {"id": "l8_c1", "question": "באיזו טכניקה השתמשה כופרת REvil ב-2021 כדי לעקוף מערכות הלבנה (Sanitization) המבוססות על מדיה פיזית?", "options": ["שליחת המיילים ישירות לשרת ה-sa.", "שימוש בקבצים המוגדרים כחבויים (Hidden Files) אשר מערכות ההלבנה לא הוגדרו לסרוק אותם.", "ביצוע מתקפת DDoS שכבה 3 על עמדת ההלבנה.", "סנכרון השעון ל-NTP שונה."], "correct": 1, "explanation": "מערכות הלבנה רבות סרקו רק קבצים גלויים, מה שאפשר לתוקפים לשתול סקריפטים זדוניים בתוך קבצי מערכת מוסתרים על גבי ה-USB."}}, {"title": "2. אבטחת OT: סביבת ייצור וציוד קריטי", "text": "מערכות OT מבוססות על לולאת משוב: **סנסורים** (קלט של טמפרטורה/לחץ) -> לוגיקה של בקר (**PLC**) -> **אקטואטורים** (פלט לביצוע פעולות פיזיות כגון סגירת ברז). המערכת מנוהלת דרך תחנות הנדסה (Engineering) מבוססות Windows ודשבורד **HMI**. פגיעות נפוצה היא הגדרת סיסמאות ברירת מחדל זהות על ידי היצרניות (סימנס, GE) ושימוש בחיבורי גישה מרחוק של היצרן ללא פיקוח.", "examinerTip": "בשאלה על ארכיטקטורת OT, זכור לציין את ה-PLC (Programmable Logic Controller) כרכיב הליבה השולט ישירות על המכשור הפיזי.", "checkpoint": {"id": "l8_c2", "question": "מהו תפקידו של בקר ה-PLC במערכת בקרה תעשייתית (OT)?", "options": ["הוא משמש כדפדפן גלישה דרך VDI.", "הוא מעבד את קלט הסנסורים ומפעיל את האקטואטורים (שסתומים, מנועים) באופן פיזי לפי הלוגיקה שהוגדרה לו.", "הוא מתעד את פקודות ה-CloudTrail של AWS.", "הוא מריץ סריקות SAST על שרת ה-Presentation."], "correct": 1, "explanation": "ה-PLC הוא המוח הלוגי המקומי של מערכת ה-OT שמקבל נתוני סנסורים ומחליט אילו פעולות פיזיות לבצע דרך האקטואטורים."}}]}, "9": {"title": "שיעור 9: הגנות OT, תקיפות מפורסמות והתחלת Incident Response", "introduction": "הבנת פתרונות ההגנה הייעודיים לעולם ה-OT (כגון דיודה חד-כיוונית), למידה ממתקפות עבר (Stuxnet, אוקראינה 2015) ומבוא לתגובה לאירועים.", "concepts": [{"title": "1. הגנות OT: דיודה ואינטגרטיביות סייפטי", "text": "הגנת OT דורשת פתרונות ייעודיים: \n- **דיודה חד-כיוונית (Data Diode)**: רכיב חומרה (Waterfall) המאפשר למידע לצאת מרשת ה-OT לרשת ה-IT בלבד (באמצעות לייזר או סיב אופטי) ללא יכולת חדירה פנימה.\n- **מערכות סייפטי (Safety Systems)**: מערכות נפרדות פיזית שתפקידן הבלעדי הוא הגנה על חיי אדם (ביצוע Shutdown של התהליך בעת הגעה לרף סיכון פיזי, ללא תלות בבקרים הרגילים).\n- **מתקפות ייחוס**: **Stuxnet (2010)** פגעה בבקרי צנטריפוגות דרך USB ושיבשה HMI. מתקפת **אוקראינה (2015)** השביתה רשת חשמל עקב השתלטות על HMI דרך VPN ללא MFA מה-IT.", "examinerTip": "בשאלה על מניעת תקיפה מרשת ה-IT לרשת ה-OT, הפתרון הטוב ביותר להציג הוא Data Diode (דיודה חד-כיוונית) המבטיחה הגנה פיזית מפני חדירה חזרה.", "checkpoint": {"id": "l9_c1", "question": "כיצד Data Diode (דיודה חד-כיוונית) מגנה על רשת ה-OT מפני תקיפות שמקורן ברשת ה-IT?", "options": ["היא מבצעת סריקת פאצ'ים אוטומטית למערכות ההפעלה.", "היא מאפשרת זרימת מידע חד-כיוונית בלבד (החוצה מה-OT ל-IT) וחוסמת פיזית כל ניסיון לשלוח פקודות או מידע בחזרה מה-IT לתוך ה-OT.", "היא דורשת הפעלת MFA על כל יוזר ב-Active Directory.", "היא מחליפה את מערכת ה-HMI במערכת סייפטי."], "correct": 1, "explanation": "דיודה מבוססת על חומרה חד-כיוונית (למשל משדר לייזר בצד אחד ומקלט בצד השני ללא משדר בכיוון ההפוך), מה שמונע חדירה לרשת הבקרה."}}, {"title": "2. הגדרת אירוע סייבר ושבעת השלבים", "text": "**Incident Response (IR)** הוא תהליך מאורגן המשלב אנשים, כלים ותהליכים כדי להתמודד עם אירוע המשנה את ה-CIA של המידע. אירוע סייבר כולל גם איומים פנימיים (עובד ממורמר) או דליפת מידע ל-AI חיצוני. שבעת שלבי הטיפול הם: 1. הבנה והגדרה (האם זה אירוע סייבר?). 2. איתור וזיהוי. 3. ניתוח הפגיעה. 4. ניתוח משמעויות עסקיות. 5. הכלה ותיחום. 6. התאוששות וניקוי. 7. חזרה לשגרה והפקת לקחים.", "examinerTip": "זכור כי שלב הפקת הלקחים (Post-Incident) הוא השלב החשוב ביותר לשיפור האבטחה הארגונית לטווח הארוך, על אף שארגונים נוטים להזניח אותו.", "checkpoint": {"id": "l9_c2", "question": "מהו השלב הראשון בתהליך ה-Incident Response (IR) בעת זיהוי אנומליה ברשת?", "options": ["הורדת השאלטר של כלל המחשבים בארגון.", "הבנה והגדרה: קביעה האם מדובר בתקלה טכנית/תפעולית שגרתית או שמא באירוע סייבר זדוני פעיל.", "הפעלת DRP ושחזור הגיבויים.", "החלפת כתובות ה-IP של ה-Firewall."], "correct": 1, "explanation": "לפני שמפעילים צוותי חירום או משביתים מערכות, חובה לנתח את הסימפטומים ולהבין האם מדובר בתקלה רגילה או באירוע אבטחה זדוני."}}]}, "10": {"title": "שיעור 10: מתודולוגיית NIST, מבנה ארגוני בחירום ומקרי בוחן", "introduction": "הבנת שלבי הטיפול באירוע על פי מסגרת העבודה של NIST, בניית מבנה צוותי חירום והפקת לקחים מאירועי עבר אמיתיים.", "concepts": [{"title": "1. מתודולוגיית NIST וציר הזמן של האירוע", "text": "על פי מודל ה-**NIST**, מחזור חיי הטיפול באירוע כולל 4 שלבים: **Prepare (הכנה)**, **Identify (זיהוי/ניתוח)**, **Investigate & Contain (חקירה והכלה)**, ו-**Remediate (תיקון/התאוששות)**. חקירה מתבצעת קדימה (פעולות תגובה) ואחורה (זיהוי נקודת החדירה המקורית - Initial Entry Point). תוקפים יכולים לשהות ברשת חודשים ארוכים לפני הגילוי (Dwell Time).", "examinerTip": "הדגש את החקירה 'אחורה' במבחן: אם תוקן השרת שנפרץ אך לא זוהתה נקודת החדירה המקורית, התוקף יחדור שוב בקלות דרך הדלת האחורית שהשאיר.", "checkpoint": {"id": "l10_c1", "question": "מדוע חיוני לחקור את אירוע הסייבר 'אחורה' (Backward Timeline Investigation)?", "options": ["כדי למנוע תשלום פיצויים לספק ה-EDR.", "כדי לזהות את נקודת החדירה המקורית (Initial Entry Point) ולחסום את הדרכים שבהן השתמש התוקף לביסוס אחיזתו, ולא רק לנקות את השרת שנפגע.", "כדי לקצר את זמני ה-RTO של שרת ה-Presentation.", "כדי לעדכן את השעונים ב-NTP."], "correct": 1, "explanation": "ניקוי הסימפטום (השרת הנגוע) אינו מספיק אם התוקף עדיין מחזיק בהרשאות גישה או דלת אחורית (Backdoor) במקום אחר ברשת."}, "image": "assets/nist_ir_lifecycle.png"}, {"title": "2. מבנה ארגוני בחירום ומקרי בוחן", "text": "בחירום מוקם **Core Ops Team** העובד במשמרות. ההנהלה מעורבת: מנכ\"ל (דיווח לדירקטוריון), משפטית (דיווח לרשות הגנת הפרטיות/בורסה), דוברות (מסרים), משאבי אנוש (לוגיסטיקה) וכספים (הערכת נזקים). מקרי בוחן: **דואר ישראל** (מעקף MFA על ידי הוספת מספרי טלפון בפורטל Self-Service), **פז (Yellow)** (התאוששות מבוססת שחזור מקומי של קבצי עסקאות מה-Back Office), ו-**NotPetya** (התגלה 'חיסון' זמני של יצירת קובץ מסוים בתיקיית ה-Temp המונע הצפנה).", "examinerTip": "בשאלה על התאוששות, ציין את מקרה פז כדוגמה לחשיבות של שמירת נתונים מבוזרת/מקומית (Offline/Local cache) המאפשרת המשכיות עסקית בעת נפילת שרת מרכזי.", "checkpoint": {"id": "l10_c2", "question": "איזה פתרון זמני ('חיסון') התגלה במתקפת NotPetya שמנע את הצפנת תחנות הקצה?", "options": ["התקנת גרסה מעודכנת של Windows 7.", "יצירת קובץ ספציפי בתיקיית ה-Temp של מערכת ההפעלה אשר גרם לנוזקה לחשוב שהתחנה כבר מוצפנת ולדלג עליה.", "חסימת כתובות ה-IP של שרתי ה-C2 ב-Firewall.", "החלפת סיסמת ה-sa בבסיס הנתונים."], "correct": 1, "explanation": "NotPetya חיפשה קובץ ספציפי כאינדיקטור להצפנה קודמת. יצירה ידנית שלו מנעה מהקוד הזדוני להריץ את מנגנון ההצפנה על אותה תחנה."}}]}, "11": {"title": "שיעור 11: אירועי סייבר בענן (AWS), BCP ו-DRP", "introduction": "הבנת מודל האחריות המשותפת בענן, שימוש בלוגים של AWS לתחקור, וההבדלים בין המשכיות עסקית (BCP) להתאוששות מאסון (DRP).", "concepts": [{"title": "1. ניהול אירועים בענן (AWS Shared Responsibility)", "text": "בענן חל **מודל האחריות המשותפת (Shared Responsibility Model)**: ב-SaaS (כגון Salesforce) רוב האירועים נובעים מטעויות הגדרה של הלקוח (הרשאות, זהויות) ולא מפריצה לספק. ב-IaaS הלקוח אחראי על מערכת ההפעלה, עדכונים ו-VPN. תחקור ב-AWS נשען על 3 לוגים: **CloudTrail** (תיעוד פעולות ושינוי הגדרות API), **CloudWatch** (ביצועים והודעות שגיאה), ו-**VPC Flow Logs** (תעבורת רשת). שדה **User Data** בהקמת שרת מהווה סיכון אם תוקף שותל בו סקריפט להרצה אוטומטית.", "examinerTip": "שנן את הלוגים של AWS: CloudTrail הוא הלוג הפורנזי המרכזי לתחקור 'מי ביצע איזה שינוי בענן' (API Auditing).", "checkpoint": {"id": "l11_c1", "question": "איזה לוג של AWS הוא החשוב ביותר לתחקור פורנזי של פעולות מנהל מערכת חשודות, כגון יצירת משתמשים חדשים או מחיקת באקטים?", "options": ["VPC Flow Logs", "AWS CloudWatch", "AWS CloudTrail", "AWS Shield"], "correct": 2, "explanation": "AWS CloudTrail מתעד את כל קריאות ה-API והפעולות שבוצעו בחשבון הענן, ומאפשר לזהות אילו משתמשים ביצעו שינויים בהגדרות התשתית."}, "image": "assets/aws_shared_responsibility.png"}, {"title": "2. המשכיות עסקית (BCP) לעומת DRP", "text": "**BCP (Business Continuity Plan)** היא תוכנית ארגונית רחבה (באחריות ההנהלה) להמשך תפקוד העסק ללא מחשוב (למשל, תשלום שכר ידני). **DRP (Disaster Recovery Plan)** היא תוכנית טכנולוגית (באחריות ה-IT) לשחזור המערכות והמידע. מדדי יעד נקבעים על ידי המנכ\"ל: **RPO (Recovery Point Objective)** - כמה מידע מותר לאבד (למשל, עד 12 שעות דאטה), ו-**RTO (Recovery Time Objective)** - תוך כמה זמן המערכות חייבות לחזור לפעילות (למשל, תוך 4 שעות). רמות אתר חליפי: **Hot Standby** (סנכרון מלא, חזרה בדקות), **Warm Standby** (תשתית חלקית, שחזור של שעות), **Cold Standby** (גיבויים בלבד, שחזור ארוך של ימים).", "examinerTip": "זכור את ההבחנה במבחן: BCP הוא תהליך עסקי כללי, בעוד DRP הוא תהליך טכנולוגי ספציפי של ה-IT.", "checkpoint": {"id": "l11_c2", "question": "מהו ההבדל המרכזי בין BCP (המשכיות עסקית) ל-DRP (התאוששות מאסון)?", "options": ["BCP עוסק רק במערכות ענן AWS, בעוד DRP עוסק בבקרים תעשייתיים.", "BCP הוא באחריות מנהל ה-IT בלבד, בעוד DRP נקבע על ידי הדוברות.", "BCP הוא תהליך ארגוני ועסקי רחב להמשך פעילות ללא מחשוב, בעוד DRP הוא המענה הטכנולוגי של ה-IT לשחזור שרתים ונתונים.", "BCP קובע את ה-RPO, בעוד DRP קובע את ה-RTO."], "correct": 2, "explanation": "BCP מבטיח שהארגון יוכל להמשיך לספק שירותים (גם בנייר ועיפרון), בעוד DRP מתמקד בצד הטכני של החזרת מערכות המחשוב לפעולה."}}]}, "12": {"title": "שיעור 12: פורנזיקה דיגיטלית, כלי Windows והכנה למבחן", "introduction": "יסודות החקירה הדיגיטלית, כלים מובנים וחינמיים לניטור וחקירה במערכת ההפעלה Windows, ומיקוד לקראת בחינת הסיום.", "concepts": [{"title": "1. עקרונות פורנזיקה ודילמת הניתוק", "text": "פורנזיקה כוללת 4 שלבים: Identification (זיהוי), Collection (איסוף), Analysis (ניתוח) ו-Reporting (דיווח). חוקים נוקשים: **אל תכבו מחשבים** - כיבוי מוחק מידע קריטי שנמצא רק בזיכרון הראם (**RAM**) כמו נוזקות Fileless. **דילמת הניתוק (Disconnection Dilemma)** מתארת את הסיכון שבהתנתקות מיידית משרת ה-C2 של התוקף - הדבר עלול לאותת לו שהוא התגלה ולגרום לו להפעיל פקודות הרסניות (מחיקה או הצפנה המונית).", "examinerTip": "בבחינה, מול שרת נגוע שמתקשר החוצה, הסבר את הדילמה: ניתוק מיידי מונע זליגה אך עלול להוביל להפעלת 'מתג מוות' (Kill Switch) והצפנה מצד התוקף, ולכן יש לבצע הכלה מבוקרת.", "checkpoint": {"id": "l12_c1", "question": "מדוע חוקר פורנזי ימליץ שלא לנתק באופן מיידי ואגרסיבי שרת נגוע מהאינטרנט ללא תכנון מוקדם?", "options": ["מפני שזה יאפס את שעון ה-NTP של השרת.", "כדי לא לאותת לתוקף שהוא התגלה, מה שעלול לגרום לו להפעיל פקודות הרסניות כמו הצפנה המונית או מחיקה כוללת של הדיסק כצעד מנע.", "מכיוון שה-EDR אינו מסוגל לעבוד ללא חיבור לאינטרנט.", "בשל דרישות רגולציית ה-GDPR."], "correct": 1, "explanation": "ניתוק אינטרנט גס עלול להפעיל מנגנוני הגנה עצמית של נוזקות מתקדמות שימחקו ראיות או יצפינו את השרת כדי להרוס את סביבת העבודה."}}, {"title": "2. כלי חקירה ב-Windows ומיקוד הבחינה", "text": "כלים לחקירה בזמן אמת ב-Windows: \n- **Task Manager**: ניטור עומסים וכתיבה חריגה לדיסק (אינדיקטור להצפנה).\n- **Event Viewer**: צפייה בלוגים של אפליקציה, אבטחה ומערכת.\n- **Task Scheduler**: בדיקת משימות מתוזמנות שהתוקף שתל לצורך שמירת אחיזה (**Persistence**).\n- **Process Explorer (Sysinternals)**: זיהוי תהליכים, תתי-תהליכים (Threads) וניתוח **Strings** למציאת מחרוזות טקסט בתוך קבצים מקומפלים.\n- **Wireshark**: ניתוח פקטיות ותעבורה רשתית.\n- **Network Share Discovery (T1135)**: תוקפים מריצים פקודות כגון `net share` או `net view \\\\\\\\hostname` ומבצעים סריקות פורטים (למשל פורט 445 SMB) כדי לאתר תיקיות ומשאבים משותפים ברשת, במטרה למצוא מידע רגיש (קבצי הגדרות, סיסמאות) או לזהות יעדים לתנועה לטרלית.", "examinerTip": "בבחינה, אם תתבקש להציג שיטות לזיהוי שמירת אחיזה (Persistence) של תוקף ב-Windows, ציין את ה-Task Scheduler ורישומי ה-Startup ב-Registry כנקודות הבדיקה הראשונות.", "checkpoint": {"id": "l12_c2", "question": "באילו כלים מובנים ב-Windows נשתמש תחילה כדי לאתר משימות מתוזמנות חשודות שהושתלו על ידי תוקף לצורך שמירת אחיזה (Persistence) ברשת?", "options": ["Wireshark ו-NirSoft.", "Event Viewer ו-Task Scheduler.", "Process Explorer ו-AWS CloudTrail.", "WAF ו-Data Diode."], "correct": 1, "explanation": "Task Scheduler מאפשר לראות את כל המשימות המתוזמנות הרצות במערכת, ו-Event Viewer מציג את הלוגים ההיסטוריים של הרצתן והקמתן."}}]}};
        const flashcardsData = [{"category": "שיעור 1", "question": "מהי דילמת הניהול (Management Dilemma) בזמן אירוע סייבר פעיל?", "answer": "הקונפליקט בין **צוות ה-IT/אבטחה** שמעוניין להשבית את המערכות מיידית כדי לחסום את התקיפה ולבצע חקירה, לבין **המנכ\"ל/הנהלה עסקית** שרוצים להשאיר את המערכות באוויר כדי להמשיך להניב הכנסות ולמנוע פגיעה מיידית בשירות."}, {"category": "שיעור 1", "question": "מהם ההבדלים בעדיפויות משולש CIA בין IT ל-OT?", "answer": "- **במערכות IT**: העדיפות הראשונה היא סודיות (Confidentiality) של המידע והנתונים.\n- **במערכות OT**: העדיפויות הראשונות הן זמינות (Availability) של התשתיות הפיזיות ושמירה על שלמות המערכת (Integrity) למניעת פגיעה בחיי אדם."}, {"category": "שיעור 2", "question": "מהי פגיעות One-Day ומדוע חלון זמן זה מסוכן כל כך?", "answer": "פגיעות שהיצרן כבר פרסם עבורה תיקון (Patch). חלון הזמן מסוכן כיוון שחולשת האבטחה הופכת לפומבית, והתוקפים ממהרים לפתח אקספלויט ולסרוק את הרשת באגרסיביות לאיתור ארגונים שטרם התקינו את הפאץ'."}, {"category": "שיעור 2", "question": "מדוע בתי חולים מתקשים לעדכן פאצ'ים בציוד רפואי כמו CT או MRI?", "answer": "ציוד זה מגיע כקופסה שחורה סגורה (לרוב עם מערכות הפעלה ישנות). עדכון עלול לבטל את אחריות היצרן, לגרום לחוסר יציבות והשבתת מכשור מציל חיים, ולכן המדיניות היא לרוב להימנע מעדכונים וליישם הגנות היקפיות."}, {"category": "שיעור 3", "question": "מדוע סנכרון זמנים ב-NTP הוא קריטי לתהליך ההקשחה?", "answer": "ללא אחידות שעונים (NTP), לוגים ממערכות שונות יציגו זמנים שונים. הדבר מונע הצלבת לוגים ומנטרל את היכולת לבנות ציר זמן (Timeline) אמין בעת חקירה פורנזית של תקיפה רוחבית."}, {"category": "שיעור 3", "question": "מהו ההבדל בין בדיקות SAST לבדיקות DAST ב-SSDLC?", "answer": "- **SAST (Static)**: מבוצעת על קוד המקור ללא הרצה, לרוב בשלב הפיתוח והקידוד.\n- **DAST (Dynamic)**: מבוצעת בזמן ריצה של האפליקציה, בשלב הבדיקות, כדי לזהות פרצות כמו SQL Injection בפועל."}, {"category": "שיעור 4", "question": "מהם חמשת השלבים של מתקפת APT סדרתית?", "answer": "1. **Reconnaissance** (איסוף מידע)\n2. **Initial Compromise** (אחיזה ראשונית)\n3. **Command & Control** (תקשורת C2)\n4. **Lateral Movement** (תנועה לטרלית)\n5. **Mission Complete** (ביצוע המשימה - CNE/CNA)"}, {"category": "שיעור 4", "question": "מהם שלושת מנגנוני אבטחת המייל SPF, DKIM ו-DMARC?", "answer": "- **SPF**: רשימת כתובות IP מורשות לשלוח מיילים מהדומיין.\n- **DKIM**: חתימה קריפטוגרפית על גוף המייל לאימות שלמות התוכן.\n- **DMARC**: מדיניות שמגדירה לשרת המקבל מה לעשות במקרה של כישלון SPF/DKIM."}, {"category": "שיעור 5", "question": "מהי מערכת EDR ומהם יתרונותיה על אנטי-וירוס קלאסי?", "answer": "מערכת Endpoint Detection & Response. בניגוד לאנטי-וירוס שמזהה רק לפי חתימות מוכרות (Signature), EDR מזהה התנהגות חשודה בזמן אמת (Behavioral), חוסם פעולות מקומית, ואוסף טלמטריה לענן לצורך תחקור פורנזי רוחבי."}, {"category": "שיעור 5", "question": "מהי דילמת ההכרזה (Declaration Dilemma) באירוע סייבר?", "answer": "הכרזה על אירוע סייבר מפעילה השלכות רחבות: חובת דיווח רגולטורית (בארץ תוך 72 שעות לרשות להגנת הפרטיות), דיווח לבורסה לחברות ציבוריות, חשש מתביעות ונזק תדמיתי כבד. לכן זו החלטת הנהלה בכירה ולא טכנית."}, {"category": "שיעור 6", "question": "מה ההבדל בין מתקפת DDoS בשכבה 3 לשכבה 7?", "answer": "- **שכבה 3 (Network)**: הצפת רוחב הפס בפקטים ריקים (SYN Flood) להעמסת שרת התקשורת. נחסם בקלות אצל ה-ISP.\n- **שכבה 7 (Application)**: הצפת שרת האפליקציה בבקשות HTTP GET/POST מורכבות שנראות לגיטימיות ומעמיסות על בסיס הנתונים. נחסם באמצעות WAF."}, {"category": "שיעור 6", "question": "מהי מתקפת Living off the Land (Fileless)?", "answer": "מתקפה שאינה מורידה קבצים זדוניים לדיסק הקשיח (מכאן השם Fileless), אלא משתמשת בכלים לגיטימיים של מערכת ההפעלה (כמו PowerShell או WMI) כדי להריץ קוד זדוני ישירות בזיכרון ה-RAM ולהתחמק מאיתור."}, {"category": "שיעור 7", "question": "מהם שלבי העיבוד של לוג במערכת SIEM?", "answer": "1. **Collection**: איסוף הלוגים הגולמיים מהמקורות השונים.\n2. **Parsing**: פירמול הלוג הגולמי לטבלה מסודרת בעלת שדות קריאים.\n3. **Correlation**: הרצת חוקים והצלבת לוגים ממקורות שונים לזיהוי תבניות תקיפה."}, {"category": "שיעור 7", "question": "מה תפקידו של אנליסט SOC Tier 1?", "answer": "מענה ראשוני לאלרטים המגיעים מה-SIEM. האנליסט מסנן התראות שווא (False Positives), פועל על פי פלייבוקים (Playbooks) מוגדרים מראש, ובמידת הצורך עושה אסקלציה (הסלמה) לצוות Tier 2/3."}, {"category": "שיעור 8", "question": "כיצד תוקפים עוקפים מערכות הלבנה (Sanitization) באמצעות התקני USB?", "answer": "תוקפים שותלים קבצי מערכת המוגדרים כחבויים (Hidden Files) על ה-USB. מאחר שמערכות הלבנה רבות אינן מוגדרות לסרוק קבצים מוסתרים, הנוזקה עוברת ללא סריקה ומורצת על ידי מנגנון ה-Autorun או המשתמש."}, {"category": "שיעור 8", "question": "מהי טכניקת DLL Masking וכיצד היא מקשה על הגילוי?", "answer": "תוקפים מעניקים לקובצי ה-DLL הזדוניים שלהם שמות הדומים מאוד לשמות של ספריות מערכת הפעלה לגיטימיות (למשל, השמטת אות אחת או הוספת תו בשם), במטרה להתחמק מסריקה ידנית או מסננים פשוטים."}, {"category": "שיעור 9", "question": "מהי דיודה חד-כיוונית (Data Diode) ומדוע משתמשים בה ב-OT?", "answer": "רכיב חומרה פיזי המבוסס על משדר ומקלט (לייזר/סיב אופטי) המאפשר זרימת נתונים רק כיוון אחד (מה-OT ל-IT לצורך ניטור), וחוסם פיזית כל מעבר של מידע או פקודות בכיוון ההפוך כדי למנוע השתלטות מרחוק על הרשת התעשייתית."}, {"category": "שיעור 9", "question": "מה קרה במתקפת הסייבר על רשת החשמל באוקראינה ב-2021/2015?", "answer": "התוקפים חדרו לרשת ה-IT דרך פישינג, גנבו סיסמאות VPN שחוברו לרשת ה-OT ללא אימות כפול (MFA), השתלטו על תחנות העבודה (HMI) של המפעילים ופתחו ידנית את מפסקי החשמל, מה שהוביל להחשכת עיר שלמה."}, {"category": "שיעור 10", "question": "מהם 4 שלבי מחזור החיים של NIST לטיפול באירוע סייבר?", "answer": "1. **Preparation** (הכנה מראש)\n2. **Detection & Analysis** (זיהוי וניתוח אנומליות)\n3. **Containment, Eradication & Recovery** (הכלה, ניקוי ושחזור)\n4. **Post-Incident Activity** (תחקיר והפקת לקחים)"}, {"category": "שיעור 10", "question": "מה התגלה במקרה NotPetya כ'חיסון' שמנע הצפנה?", "answer": "התגלה כי נוזקת NotPetya בודקת קיום של קובץ ספציפי בתיקיית ה-Temp של התחנה. אם הקובץ קיים, היא מניחה שהתחנה כבר מוצפנת ומדלגת עליה. יצירת קובץ ריק בשם זה שימשה כחיסון זמני."}, {"category": "שיעור 11", "question": "מה ההבדל במודל האחריות המשותפת בענן בין SaaS ל-IaaS?", "answer": "- **ב-SaaS**: ספק הענן אחראי על התשתית והאפליקציה. הלקוח אחראי על הגדרות גישה וניהול זהויות (שם נובעות רוב הטעויות והפרצות).\n- **ב-IaaS**: הלקוח אחראי על מערכת ההפעלה, הגדרות השרת, עדכוני פאצ'ים ואבטחת האפליקציות שלו."}, {"category": "שיעור 11", "question": "מה ההבדל בין מדדי RTO ל-RPO בתהליך התאוששות (DRP)?", "answer": "- **RTO (Recovery Time)**: יעד זמן ההתאוששות - תוך כמה זמן מרגע האסון המערכת חייבת לחזור לתפקוד מלא.\n- **RPO (Recovery Point)**: יעד נקודת השחזור - כמה מידע מקסימלי (בשעות/ימים) הארגון מוכן לאבד (מגדיר את תדירות הגיבויים)."}, {"category": "שיעור 12", "question": "מדוע אסור לכבות מחשבים נגועים בעת חקירה פורנזית דיגיטלית?", "answer": "כיבוי המחשב מוחק מיידית את כל המידע הנדיף שנמצא בזיכרון ה-RAM (Order of Volatility). ראיות קריטיות כמו מפתחות הצפנה של כופרה, תהליכים פעילים בזיכרון ונוזקות Fileless הרצות בזיכרון בלבד - ייעלמו לנצח."}, {"category": "שיעור 12", "question": "מהי דילמת הניתוק (Disconnection Dilemma) בחקירה פורנזית?", "answer": "ניתוק מיידי של שרת נגוע מהאינטרנט מונע זליגת מידע, אך עלול לאותת לתוקף שהוא התגלה. תוקפים מתוחכמים מגדירים מנגנוני הגנה עצמית (מתגי מוות) שברגע זיהוי אובדן רשת מפעילים מחיקה כוללת או הצפנת הדיסק."}, {"category": "שיעור 1", "question": "מהי הגדרת אירוע סייבר ומה ההבדל בינו לבין מתקפת סייבר?", "answer": "**אירוע סייבר** הוא אירוע בעל השפעה עסקית, חוקית או רגולטורית (יכול להיגרם מגורם פנימי או חיצוני). **מתקפת סייבר** היא פעולה מלחמתית/זדונית ממוקדת של מדינה או ארגון טרור נגד מדינה או תשתיות קריטיות (למשל נמלים, בורסות)."}, {"category": "שיעור 1", "question": "מהם שלושת עמודי התווך של קורס ניהול אירועי סייבר?", "answer": "1. **הכנות מוקדמות להקטנת הסיכון** (הקשחה, ניהול פאצ'ים ונכסים, סגמנטציה).\\n2. **התמודדות עם אירוע סייבר בזמן אמת** (ניטור, זיהוי, הכלה, ניקוי).\\n3. **שיקום הארגון והתאוששות** (הפעלת DRP/BCP, חזרה לשגרה, הפקת לקחים)."}, {"category": "שיעור 8", "question": "מה ההבדל בין שימוש ב-WSUS/Intune לבין עדכון 'קלאסטר' (Cluster) במערכות כבדות?", "answer": "**WSUS/Intune** משמשים לדחיפת עדכונים המונית לתחנות קצה ולפטופים (שם העדכון קל יחסית). במערכות כבדות (SAP, Oracle) העדכון מורכב ומבוצע בשיטת **קלאסטר** (עדכון שרת אחד בזמן שהשני פעיל) כדי לשמור על זמינות רציפה, ודורש תוכנית נסיגה (Rollback) מוכנה."}, {"category": "שיעור 9", "question": "מהו תפקידן של מערכות סייפטי (Safety Systems) בעולם ה-OT?", "answer": "מערכות אלו מבודדות פיזית ומיועדות **להגנה על חיי אדם** בלבד. הן מבצעות כיבוי חירום (Shutdown) אוטומטי של התהליך התעשייתי אם הוא חורג מגבולות הבטיחות (למשל, מניעת פיצוץ מכל אמוניה), ללא תלות בבקרי ה-PLC הסטנדרטיים."}, {"category": "שיעור 9", "question": "מהי החשיבות של סגירת הרשאות מיידית לעובד מפוטר עוד לפני שיחת השימוע?", "answer": "למנוע **איום פנימי (Insider Threat)** מצד עובד ממורמר שיכול לנצל את הגישה שלו לנקמה. מקרה בוחן הראה שעובד שתל 'פצצת זמן' (ג'וב מתוזמן למחיקת טבלאות בסיס נתונים) שהופעל 3 חודשים לאחר פיטוריו."}, {"category": "שיעור 10", "question": "מהו צוות ה-Core Ops Team ומדוע הוא מוגדר לפעילות במשמרות?", "answer": "צוות הליבה המורכב ממומחי סיסטם, תקשורת, DB וענן המרכז את הטיפול הטכני באירוע. הוא פועל במשמרות כדי למנוע שחיקה ועייפות של הצוות, המהוות גורם קריטי לטעויות ניהוליות וטכניות באירועים מתמשכים."}, {"category": "שיעור 10", "question": "מהו המענה שכל אחת ממחלקות ההנהלה (מנכ\"ל, משפטית, דוברות, משאבי אנוש, כספים) נותנת באירוע סייבר?", "answer": "- **מנכ\\\"ל**: מנהל את המשבר הכללי ומדווח לדירקטוריון.\\n- **משפטית**: מדווחת לבורסה (לחברות ציבוריות) ולרשות להגנת הפרטיות, ובוחנת היבטי תביעות.\\n- **דוברות**: מנהלת את המסרים והודעות לתקשורת.\\n- **משאבי אנוש**: דאגה לרווחת הצוותים (אוכל, לינה) וגיוס כוח אדם חיצוני.\\n- **כספים**: מעריכים נזק כלכלי ועלויות ביטוח."}, {"category": "שיעור 11", "question": "מהן רמות האתר החליפי השונות (Hot, Warm, Cold Standby) ומה זמני השחזור שלהן?", "answer": "- **Hot Standby**: אתר משוכפל בסינכרון מלא המאפשר חזרה לפעילות תוך דקות.\\n- **Warm Standby**: תשתית חלקית הדורשת זמן שחזור של מספר שעות.\\n- **Cold Standby**: קיום גיבויים בלבד ללא חומרה מוכנה, הדורש זמן שחזור ארוך של ימים."}, {"category": "שיעור 11", "question": "אילו לוגים של AWS מנותחים בחקירה פורנזית ומה ההבדל ביניהם?", "answer": "- **AWS CloudTrail**: מתעד קריאות API, פעולות משתמשים ושינויי הגדרות תשתית (מי יצר שרת או מחק באקט).\\n- **AWS CloudWatch**: ביצועי שרתים (CPU, זיכרון) והודעות שגיאה של האפליקציה.\\n- **VPC Flow Logs**: תעבורת הרשת (IP מקור/יעד ופורטים)."}, {"category": "שיעור 12", "question": "מהם 4 שלבי תהליך הפורנזיקה הדיגיטלית?", "answer": "1. **Identification** (זיהוי אנומליות).\\n2. **Collection** (איסוף ראיות תוך שמירה על שלמותן והכרת דפוסי התוקף).\\n3. **Analysis** (הבנת דרך הפעולה והאירוע).\\n4. **Reporting** (כתיבת דוח רשמי לסגירת חולשות ומניעת הישנות)."}, {"category": "שיעור 12", "question": "באילו כלים של Windows נשתמש לבדיקת משימות מתוזמנות, ניתוח Strings וניטור Registry?", "answer": "- **Task Scheduler**: איתור משימות מתוזמנות חשודות השומרות על אחיזה (Persistence).\\n- **Process Explorer (פונקציית Strings)**: חילוץ מחרוזות טקסט מקובץ הרצה מקומפל לזיהוי כתובות IP/פקודות חשודות.\\n- **NirSoft Utilities**: כלים לניתוח ה-Registry וניטור רשת."}, {"category": "שיעור 12", "question": "מהו מודל MITRE ATT&CK וכיצד הוא מסייע בניתוח קבוצות תקיפה?", "answer": "בסיס ידע עולמי המתעד טקטיקות (כמו Initial Access, Persistence) וטכניקות תקיפה. הוא מאפשר למפות את דפוסי הפעולה של קבוצות תקיפה מוכרות (כמו **APT29 הרוסית** המתמקדת בריגול ומדינות, או **APT33 האיראנית** המתמקדת במערכות בקרה ותשתיות) ולבנות מולן בקרות הגנה מתאימות."}, {"category": "שיעור 12", "question": "מהי טכניקת Network Share Discovery (T1135) ב-MITRE ATT&CK וכיצד תוקף מנצל אותה?", "answer": "טכניקת גילוי (Discovery) שבה התוקף מנסה למפות תיקיות, כוננים ומשאבים משותפים ברשת הפנימית (למשל SMB/NFS Shares) באמצעות פקודות כמו `net share` או `net view`. המטרה היא לאתר קבצים עם מידע רגיש ולזהות שרתים ויעדים נוספים לתנועה לטרלית."}];
        const mcQuestions = [{"category": "שיעור 1", "question": "מנהל אבטחה מזהה תעבורה חריגה משרת ה-ERP. הוא דורש לכבות את השרת, אך מנהל הכספים מתנגד בטענה שהשבתה תעצור את המכירות. קונפליקט זה מייצג את:", "options": ["העדר ידע טכני של מנהל הכספים.", "דילמת הניהול (Management Dilemma) בין המשכיות עסקית לעצירת איומים.", "באג אבטחה בשכבה 7 של האפליקציה.", "כשל בשרשרת השמירה על ראיות (Chain of Custody)."], "answerIndex": 1, "explanation": "דילמת הניהול מציגה את הקונפליקט המובנה בין רצון אנשי האבטחה לעצור את האירוע על ידי בידוד והשבתה לבין רצון ההנהלה להמשיך להפעיל את העסק ולמנוע נזק כלכלי ישיר."}, {"category": "שיעור 1", "question": "ארגון פיננסי מעוניין להגן על סודיות פרטי כרטיסי האשראי של לקוחותיו. איזה רכיב במשולש ה-CIA הוא בעל העדיפות העליונה במקרה זה?", "options": ["זמינות (Availability)", "שלמות (Integrity)", "סודיות (Confidentiality)", "סנכרון זמנים ב-NTP"], "answerIndex": 2, "explanation": "במערכות IT המטפלות במידע פיננסי או אישי רגיש, סודיות המידע (Confidentiality) היא העדיפות העליונה כדי למנוע הדלפת נתונים ופגיעה בפרטיות."}, {"category": "שיעור 1", "question": "כיצד מחושב מדד הסיכון באבטחת מידע?", "options": ["סבירות האירוע פלוס עוצמת הנזק.", "סבירות האירוע כפול עוצמת הנזק (Risk = Likelihood x Impact).", "רוחב הפס חלקי מספר בקשות ה-HTTP.", "זמן ה-RTO פלוס זמן ה-RPO."], "answerIndex": 1, "explanation": "מדד הסיכון (Risk) הוא שילוב של ההסתברות שהאירוע יתרחש (Likelihood) ועוצמת הנזק שייגרם לארגון אם האירוע אכן יתרחש (Impact)."}, {"category": "שיעור 1", "question": "חברה מחליטה לרכוש פוליסת ביטוח סייבר כדי לכסות עלויות פוטנציאליות של פריצה. באיזו אסטרטגיה לטיפול בסיכון מדובר?", "options": ["הפחתת סיכון (Mitigation)", "קבלת סיכון (Acceptance)", "העברת סיכון (Transfer)", "הימנעות מסיכון (Avoidance)"], "answerIndex": 2, "explanation": "העברת סיכון (Transfer) מתבצעת על ידי העברת האחריות הפיננסית או התפעולית לצד שלישי, כגון חברת ביטוח או ספק חיצוני."}, {"category": "שיעור 2", "question": "מהו האתגר המרכזי של מדיניות BYOD (Bring Your Own Device) בארגון?", "options": ["מכשירים אישיים צורכים יותר רוחב פס ברשת.", "היטשטשות גבולות הרשת הארגונית (Borders without IT) והכנסת מכשירים לא מנוהלים לרשת הפנימית.", "העדר תאימות לפרוטוקול Modbus.", "חוסר יכולת לבצע סנכרון NTP במכשירים אלו."], "answerIndex": 1, "explanation": "BYOD מאפשר לעובדים לחבר מכשירים אישיים המכילים מידע ארגוני ואפליקציות שאינם תחת שליטה מלאה של מחלקת ה-IT, מה שמקשה על הגדרת גבולות ההגנה הארגוניים."}, {"category": "שיעור 2", "question": "במודל 3 השכבות, איזו שכבה מאובטחת במיוחד ואינה אמורה לקבל חיבור ישיר משכבת התצוגה (Presentation Layer)?", "options": ["שכבת האפליקציה (Application Layer)", "שכבת בסיס הנתונים (Database Layer)", "חומת האש החיצונית", "שרת ה-VPN"], "answerIndex": 1, "explanation": "שכבת בסיס הנתונים (Database) מחזיקה ביהלומי הכתר (הדאטה). כחלק מסגמנטציה נכונה, היא מבודדת לחלוטין ומתקשרת אך ורק עם שכבת האפליקציה, לעולם לא ישירות מול שכבת התצוגה החשופה לאינטרנט."}, {"category": "שיעור 2", "question": "מערכת MRI בבית חולים מופעלת על ידי מערכת הפעלה ישנה. היצרן מזהיר כי התקנת עדכוני אבטחה עלולה להשבית את המכשיר. מה תמליץ לעשות?", "options": ["לבצע עדכון חירום אגרסיבי ללא הודעה מראש.", "להימנע מעדכון, לבודד את המכשיר בסגמנט רשת נפרד (VLAN) וליישם בקרת אפליקציות (Application Whitelisting) קשיחה.", "להשבית את מערכת ה-MRI לצמיתות.", "להפעיל את פרוטוקול CloudTrail של AWS על המכשיר."], "answerIndex": 1, "explanation": "בציוד קריטי שאינו ניתן לעדכון (Legacy Systems), הפתרון הנכון הוא בידוד רשתי (סגמנטציה) והחלת בקרת קבצים נוקשה (Whitelisting) כדי למנוע ריצת קוד זדוני ללא צורך בעדכון מערכת ההפעלה."}, {"category": "שיעור 2", "question": "מהו פער הסיכון העיקרי בחלון הזמן של One-Day Vulnerability?", "options": ["חולשת האבטחה טרם נתגלתה על ידי היצרן או הציבור.", "חולשת האבטחה פורסמה והתוקפים סורקים את הרשת באגרסיביות, בעוד הארגון טרם הטמיע את הפאץ' ששחרר היצרן.", "הפאץ' שוחרר אך הוא מוחק את ה-RAM.", "התוקף משתמש ב-Data Diode כדי לחדור לרשת."], "answerIndex": 1, "explanation": "במצב One-Day, פרטי הפרצה גלויים לכל. תוקפים סורקים ומאתרים שרתים שלא עודכנו באמצעות כלים אוטומטיים, מה שמציב ארגונים איטיים בעדכון תחת סיכון פריצה כמעט ודאי."}, {"category": "שיעור 3", "question": "מהי הפעולה הראשונה והבסיסית ביותר בהקשחת בסיס נתונים (כמו SQL Server)?", "options": ["ביצוע בדיקות חדירות שבועיות (PT).", "שינוי סיסמת ברירת המחדל של משתמש הניהול הראשי (System Administrator - sa) או חסימתו.", "העברת שרת בסיס הנתונים ל-VPC הציבורי בענן.", "הפעלת פרוטוקול SPF."], "answerIndex": 1, "explanation": "תוקפים רבים משתמשים בסריקות פשוטות כדי לאתר בסיסי נתונים עם סיסמאות sa ברירת מחדל. שינוי סיסמה זו או ביטול המשתמש הוא שלב ההקשחה הראשוני והחשוב ביותר."}, {"category": "שיעור 3", "question": "מדוע סנכרון שעונים באמצעות NTP נחשב לרכיב הגנה והקשחה חשוב?", "options": ["הוא מונע הזרקות קוד בשדות קלט.", "הוא מאפשר הצלבת לוגים תקינה ובניית ציר זמן אחיד בחקירה פורנזית של תקיפה.", "הוא מייתר את הצורך ב-Stateful Packet Filtering.", "הוא מזהה נוזקות בזיכרון ה-RAM."], "answerIndex": 1, "explanation": "ללא סנכרון זמנים אחיד (NTP), לוגים משרתים שונים יראו זמנים שונים, מה שיקשה מאוד על שחזור ציר הזמן של חדירת התוקף ומעבריו ברשת."}, {"category": "שיעור 3", "question": "באיזה שלב של פיתוח תוכנה מאובטח (SSDLC) מתבצע שימוש בכלי SAST (Static Application Security Testing)?", "options": ["בשלב הדרישות (Requirements).", "בשלב הפיתוח והקידוד (Development & Coding) על גבי קוד המקור.", "בשלב ההטמעה והתחזוקה (Production).", "בשלב הפסקת הפרויקט."], "answerIndex": 1, "explanation": "כלי SAST מנתחים את קוד המקור של האפליקציה ללא הרצתה, במטרה לאתר חולשות אבטחה וכשלים לוגיים כבר בזמן כתיבת הקוד בשלב הפיתוח."}, {"category": "שיעור 3", "question": "כיצד בדיקת תקינות קלט (Input Validation) מגנה על האפליקציה?", "options": ["היא מונעת מהמשתמשים לבצע הזמנות בשעות הלילה.", "היא מסננת תווים מיוחדים ושאילתות זדוניות בשדות הקלט, ובכך מונעת מתקפות כמו SQL Injection.", "היא מעדכנת את פאצ'י מערכת ההפעלה של השרת.", "היא שומרת את הראיות הדיגיטליות ב-NTP."], "answerIndex": 1, "explanation": "בדיקת תקינות קלט מוודא שמשתמשים מזינים רק נתונים תקינים (למשל, רק מספרים בשדה תעודת זהות) וחוסמת ניסיונות להזרקת פקודות SQL או סקריפטים."}, {"category": "שיעור 3", "question": "מהו המאפיין הייחודי של מתקפת CNI (Computer Network Influence)?", "options": ["היא מוחקת פיזית את שרתי בסיס הנתונים של הארגון.", "היא משתמשת ברשתות כדי להשפיע על התודעה הציבורית, הפצת מידע כוזב ויצירת מציאות מדומה.", "היא גונבת מידע רגיש לצורכי ריגול תעשייתי.", "היא מבוססת על שימוש בהתקני USB נגועים בלבד."], "answerIndex": 1, "explanation": "תקיפות CNI מתמקדות במימד התודעתי (Influence) והפצת מסרים פוליטיים/עסקיים כוזבים כדי להשפיע על דעת הקהל, בשונה מתקיפות הרסניות (CNA) או ריגול (CNE)."}, {"category": "שיעור 3", "question": "איזה נזק מרכזי חוותה חברת 'בינת תוכנה' בעקבות הפריצה לשרת ה-PoC הישן שלה, על אף שהשרת לא הכיל מידע עסקי רגיש?", "options": ["נזק פיזי לבקרים התעשייתיים במפעל.", "נזק תדמיתי כבד ואובדן אמון מצד הלקוחות שחששו שכלל רשת החברה נפרצה.", "קריסת רשת החשמל של המשרדים.", "חיוב כספי ישיר על ידי רגולציית GDPR בארה\"ב."], "answerIndex": 1, "explanation": "הנזק התדמיתי (Reputational Damage) נבע מכך שלקוחות לא ידעו להבחין בין שרת בדיקה זמני לרשת הייצור המרכזית, והניחו שרמת האבטחה של החברה כולה ירודה."}, {"category": "שיעור 4", "question": "תוקף מנטר את הפרופילים הציבוריים של עובדי חברה ב-LinkedIn כדי לאתר את כתובות המייל שלהם. באיזה שלב של מתקפת ה-APT הוא נמצא?", "options": ["Initial Compromise (אחיזה ראשונית)", "Lateral Movement (תנועה לטרלית)", "Reconnaissance (איסוף מידע)", "Command & Control (C2)"], "answerIndex": 2, "explanation": "שלב ה-Reconnaissance (איסוף מידע) הוא השלב הראשון שבו התוקף מלקט מודיעין על המטרה ועל האנשים בה כדי לתכנן את וקטור התקיפה המתאים ביותר."}, {"category": "שיעור 4", "question": "כיצד פועל מנגנון ה-SPF (Sender Policy Framework) להגנה על שרת הדואר הארגוני?", "options": ["הוא מצפין את גוף המייל באמצעות מפתח פרטי.", "הוא מגדיר רשומת DNS המכילה את רשימת כתובות ה-IP המורשות לשלוח מיילים בשם הדומיין, ומאפשר לשרת המקבל לדחות מיילים משרתים לא מורשים.", "הוא מריץ את קבצי המייל בתוך Sandbox.", "הוא מונע מתקפות DDoS בשכבה 7."], "answerIndex": 1, "explanation": "SPF מבוסס על הצלבת כתובת ה-IP של השרת השולח מול רשומת ה-DNS של הדומיין. אם ה-IP אינו ברשימה, הדבר מעיד על ניסיון זיוף (Spoofing)."}, {"category": "שיעור 4", "question": "איזה מנגנון אימות אימייל עושה שימוש בחתימה קריפטוגרפית (Cryptographic Signature) המשולבת בכותרת המייל כדי לוודא שתוכנו לא עבר שינוי?", "options": ["SPF", "DKIM", "DMARC", "Zero-Trust"], "answerIndex": 1, "explanation": "DKIM (DomainKeys Identified Mail) חותם על המייל קריפטוגרפית, מה שמאפשר לשרת המקבל לוודא שהמייל אכן יצא מהדומיין השולח וכי תוכנו נותר שלם לחלוטין במעבר."}, {"category": "שיעור 4", "question": "במסגרת ארכיטקטורת Zero-Trust, מהן שלוש דרישות הסף לאישור גישה של מחשב קצה למשאבי הארגון?", "options": ["שימוש ב-Data Diode, הפעלת NTP וסריקת SAST.", "אימות חזק (MFA), מכשיר מנוהל ותואם אבטחה (Compliant Device), והרשאות גישה מינימליות (Least Privilege).", "שינוי סיסמת ה-sa, הגדרת WAF וסנכרון WSUS.", "חסימת פורט 80, שימוש ב-VPN והתקנת Windows 7."], "answerIndex": 1, "explanation": "Zero-Trust דורש אימות מתמיד של הזהות (MFA), וידוא שהמחשב עצמו מאובטח ומעודכן (Compliant), והגבלת הגישה למינימום ההכרחי בלבד (Least Privilege)."}, {"category": "שיעור 5", "question": "מהו היתרון המרכזי של זיהוי התנהגותי (Behavioral Detection) במערכות EDR בהשוואה לאנטי-וירוס קלאסי?", "options": ["הוא דורש פחות זיכרון RAM בתחנת העבודה.", "הוא מסוגל לזהות ולחסום איומים חדשים ולא מוכרים (Zero-Day) על פי אופן התנהגותם (כגון הצפנה המונית של קבצים), ללא תלות בחתימה קודמת.", "הוא אינו מחייב סנכרון NTP.", "הוא חוסם תקיפות DDoS שכבה 3 במקור."], "answerIndex": 1, "explanation": "אנטי-וירוס קלאסי תלוי בחתימות מוכרות. EDR מנתח את פעולות הקבצים בזמן אמת, ומזהה התנהגויות זדוניות (כמו פקודות PowerShell חריגות או הצפנה) גם אם הקובץ עצמו חדש לחלוטין."}, {"category": "שיעור 5", "question": "מדוע בקרת אפליקציות (Application Whitelisting) מומלצת במיוחד למערכות בקרה תעשייתית (SCADA) או למכשור רפואי?", "options": ["מכיוון שמערכות אלו משנות את קוד המקור שלהן מדי יום.", "מפני שמדובר בסביבות עבודה סטטיות וקבועות שאינן משתנות לעיתים קרובות, מה שמאפשר לחסום הרצה של כ ת נתונים תקינים ב-HMI.", "הם ניתקו את חיבור ה-NTP של המפעל.", "הם מחקו את קבצי ה-Active Directory של הארגון."], "answerIndex": 1, "explanation": "Stuxnet שינתה את מהירות הסיבוב של הצנטריפוגות לסירוגין וגרמה להרס מכני, ובמקביל שלחה נתוני כזב תקינים לחדר הבקרה (HMI) כדי שהמפעילים לא יבחינו באנומליה."}, {"category": "שיעור 9", "question": "מהו תפקידו של רכיב ה-Safety System במערכות OT תעשייתיות?", "options": ["להגן על סודיות הנתונים במערכת ה-IT.", "לשמש כמערכת הגנה פיזית עצמאית ומנותקת שתפקידה הבלעדי הוא לבצע כיבוי חירום (Shutdown) של התהליך במקרה של סכנת חיים או פיצוץ.", "לבצע סריקות קוד SAST אוטומטיות.", "לשמש כ-WAF לשרת ה-Presentation."], "answerIndex": 1, "explanation": "מערכת הבטיחות (Safety) עובדת בנפרד ממערכות הבקרה הרגילות, ותפקידה היחיד הוא מניעת נזק פיזי קטסטרופלי ופגיעה בחיי אדם במצב חירום."}, {"category": "שיעור 10", "question": "על פי מודל NIST לניהול אירועים, איזה שלב עוסק בבידוד המערכות הנגועות ומניעת התפשטות התקיפה ברשת?", "options": ["הכנה (Preparation)", "זיהוי וניתוח (Detection & Analysis)", "הכלה (Containment)", "הפקת לקחים (Post-Incident)"], "answerIndex": 2, "explanation": "שלב ההכלה (Containment) מיועד לצמצם את מרחב התמרון של התוקף ולמנוע ממנו לבצע תנועה לטרלית או להצפין שרתים נוספים ברשת."}, {"category": "שיעור 10", "question": "במהלך תחקור אירוע סייבר, לשם מה משמשת 'שרשרת שמירה על ראיות' (Chain of Custody)?", "options": ["כדי לוודא שהגיבויים הארגוניים מסונכרנים ל-NTP.", "לתיעוד מלא וחתום של כל שלבי הטיפול והגישה לראיות הדיגיטליות, כדי להבטיח את אמינותן ולשמור על קבילותן בבית משפט.", "לביצוע סגמנטציה בין שרתי הפיתוח לשרתי הייצור.", "לחסימת מתקפות SQL Injection בשלב הבדיקות."], "answerIndex": 1, "explanation": "שרשרת שמירה על ראיות מתעדת במדויק מי אסף את הראיה, היכן נשמרה ומי ניגש אליה, ובכך מונעת טענות לשיבוש או החלפת הראיות במידה והאירוע יגיע להליך משפטי."}, {"category": "שיעור 10", "question": "איזה כשל אבטחה נוצל במתקפת הסייבר על דואר ישראל כדי לעקוף את מנגנון האימות הדו-שלבי (MFA)?", "options": ["הזרקת SQL Injection לשדה ה-sa.", "ניצול פורטל -RPO.", "BCP הוא תוכנית ארגונית ועסקית להמשך תפקוד הארגון ללא תלות במערכות מחשוב, בעוד DRP הוא המענה הטכנולוגי (IT) לשחזור המידע והשרתים.", "BCP מיושם רק במערכות OT, בעוד DRP מיושם רק במערכות IT.", "BCP מחייב רכישת ביטוח סייבר, בעוד DRP מחייב סנכרון NTP."], "answerIndex": 1, "explanation": "BCP מתמקד בצד העסקי (איך ממשיכים למכור, לשלם משכורות ולתת שירות ידנית), בעוד DRP מתמקד בצד הטכני של החזרת מערכות המחשוב לפעילות."}, {"category": "שיעור 11", "question": "מה מייצג מדד ה-RPO (Recovery Point Objective) בהערכות ההתאוששות מאסון?", "options": ["תוך כמה זמן מרגע נפילת השרת המערכת חייבת לחזור לפעילות.", "כמות הנתונים המקסימלית (במונחי זמן) שהארגון מוכן לאבד במקרה של אסון, המגדירה את תדירות הגיבויים הנדרשת.", "מספר חברי צוות ה-Core Ops הנדרש למשמרת בחירום.", "רמת האבטחה של ספק ה-SaaS."], "answerIndex": 1, "explanation": "RPO (יעד נקודת שחזור) מגדיר את גיל הנתונים המרבי שמותר לשחזר מהגיבוי. לדוגמה, RPO של 4 שעות מחייב ביצוע גיבוי לפחות כל 4 שעות."}, {"category": "שיעור 11", "question": "ארגון מגדיר אתר שחזור במצב Hot Standby. מהי המשמעות של הגדרה זו?", "options": ["קיומם של גיבויים על גבי קלטות המאוחסנות בכספת מרוחקת ללא חומרה מוכנה.", "קיומה של תשתית חומרה חלקית בענן הדורשת שחזור ידני של מספר שעות.", "מערכת משוכפלת ופעילה העובדת בסינכרון מלא (או כמעט מלא) מול האתר המרכזי ומאפשרת מעבר מיידי ורציף לפעילות תוך דקות בודדות.", "מערכת המבודדת פיזית באמצעות Data Diode."], "answerIndex": 2, "explanation": "אתר Hot Standby שומר על עותק חי ומעודכן בזמן אמת של הנתונים והאפליקציה, ומאפשר המשכיות עסקית מהירה ביותר במקרה של נפילת האתר הראשי."}, {"category": "שיעור 12", "question": "מדוע חוקרים פורנזיים מדגישים כי אין לכבות (Power Off) מחשב שנחשד כנגוע בעת זיהוי הפריצה?", "options": ["כיבוי המחשב מוחק את רשומות ה-SPF ב-DNS.", "מכיוון שכיבוי מוחק מיידית את זיכרון ה-RAM (שהוא מידע נדיף), ובכך נעלמות ראיות קריטיות כמו תהליכי נוזקות Fileless, חיבורי רשת פעילים ומפתחות הצפנה של כופרות.", "מפני שזה גורם להשבתת מערכות ה-NTP הארגוניות.", "כדי לא לעבור את מכסת ה-RTO שהוגדרה על ידי המנכ\"ל."], "answerIndex": 1, "explanation": "זיכרון ה-RAM הוא זיכרון נדיף (Volatile Memory). כיבוי פיזי של המחשב מוחק את כל תוכנו, מה שעלול להרוס את הראיות הדיגיטליות הקריטיות ביותר לחקירה."}, {"category": "שיעור 12", "question": "מהי 'דילמת הניתוק' (Disconnection Dilemma) העומדת בפני חוקר פורנזי ומנהל רשת בעת גילוי אירוע אבטחה פעיל?", "options": ["האם לדווח לרשות להגנת הפרטיות או להסתיר את הפריצה.", "ניתוק מיידי של השרת מהאינטרנט מונע זליגת מידע, אך עלול לאותת לתוקף שהוא התגלה ולגרום לו להפעיל פקודות הרסניות (מחיקת קבצים או הצפנה המונית).", "האם להשתמש ב-Process Explorer או ב-Wireshark.", "האם לבצע גיבוי במצב Hot Standby או Cold Standby."], "answerIndex": 1, "explanation": "דילמת הניתוק דורשת שקלול סיכונים: האם לנתק מיד כדי לעצור דלף מידע או להשאיר את השרת מחובר זמנית כדי לחקור את התוקף ולמנוע הפעלת מנגנוני מחיקה עצמית."}, {"category": "שיעור 12", "question": "איזה כלי מובנה במערכת ההפעלה Windows משמש לבדיקת משימות מתוזמנות שהתוקף יכול היה לשתול כדי לשמור על אחיזה (Persistence) ברשת?", "options": ["Task Scheduler", "Device Manager", "Windows Defender Signatures", "NTP Time Sync"], "answerIndex": 0, "explanation": "תוקפים רבים משתמשים במערכת תזמון המשימות (Task Scheduler) של Windows כדי להגדיר שהקובץ הזדוני שלהם ירוץ מחדש מדי יום או עם עליית המערכת, וכך שומרים על אחיזה."}, {"category": "שיעור 12", "question": "במהלך ניתוח קובץ חשוד, אנליסט משתמש ב-Process Explorer ומפעיל את פונקציית Strings. מהי מטרת פעולה זו?", "options": ["היא מוחקת קבצים חבויים (Hidden Files) ב-USB.", "היא מחלצת ומציגה מחרוזות טקסט קריאות מתוך קובץ מקומפל כדי לאתר כתובות IP חשודות, פקודות או שמות קבצים המעידים על אופיו של הקובץ.", "היא מסננת בקשות HTTP GET זדוניות ב-WAF.", "היא יוצרת עותק Image של זיכרון ה-RAM."], "answerIndex": 1, "explanation": "פונקציית Strings מחלצת מחרוזות טקסט (כגון כתובות URL, כתובות IP או הודעות שגיאה) מתוך קובצי הרצה (EXE/DLL), ומאפשרת לקבל אינדיקציה מהירה על תפקיד הקובץ."}, {"category": "שיעור 12", "question": "במהלך תחקור אירוע, אנליסט SOC מזהה הרצת פקודות `net view \\\\hostname` וסריקת פורט 445 (SMB) ברשת הפנימית. איזו טכניקת MITRE ATT&CK מבוצעת כאן?", "options": ["Lateral Movement (תנועה לטרלית)", "Network Share Discovery (T1135 - גילוי שיתופי רשת)", "Defense Evasion (התחמקות מהגנות)", "Privilege Escalation (הסלמת הרשאות)"], "answerIndex": 1, "explanation": "הרצת פקודות כמו net view וסריקת פורט 445 (SMB) מיועדות למפות משאבים ותיקיות משותפות ברשת הפנימית (Network Share Discovery - T1135) תחת טקטיקת Discovery, במטרה למצוא מידע רגיש או נתיבי תנועה לטרלית."}];
        const openScenarios = [{"shortTitle": "תרחיש 1: שרת ה-PoC של 'בינת תוכנה'", "title": "תרחיש 1: פריצה לשרת PoC מיושן ולא מנוהל (Bynet Case Study)", "description": "שרת פיתוח זמני (PoC) של חברת 'בינת תוכנה' הושאר מחובר ישירות לאינטרנט ללא תחזוקה, עדכוני אבטחה או פיקוח במשך 12 שנים. קבוצת התקיפה Handala גילתה אותו, פרצה אליו ופירמטה את השרת. השרת לא הכיל מידע עסקי או פרטי רגיש של לקוחות. למרות זאת, עם פרסום הפריצה, לקוחות רבים דרשו להתנתק לאלתר ממערכות החברה.\n\nשאלה: נתח את סוג הנזק שנגרם לארגון במקרה זה, הסבר מדוע הוא חמור כל כך על אף שלא דלף מידע רגיש, ומהו כשל האבטחה המרכזי ברמת ניהול הנכסים.", "answer": "1. **סוג הנזק**: נזק תדמיתי כבד (Reputational Damage) ואובדן אמון הלקוחות.\n2. **הסבר החומרה**: לקוחות חיצוניים אינם מבינים את ההבדל בין שרת בדיקה מבודד (PoC) לבין רשת הייצור של הארגון. מבחינתם, 'החברה נפרצה', מה שמעיד על רמת אבטחה ירודה ומעלה חשש כבד שנתוניהם הרגישים המנוהלים ברשת הייצור חשופים גם הם.\n3. **כשל האבטחה**: כשל חמור בניהול נכסים (Asset Management) וניהול פגיעויות (Vulnerability Management). השארת שרת פתוח לאינטרנט במשך 12 שנים ללא פיקוח מראה על העדר 'ספר נכסים' מעודכן והעדר בקרות להסרת שרתים שיצאו משימוש (Decommissioning).", "rubric": ["זיהוי והגדרת הנזק כנזק תדמיתי/פגיעה במוניטין ובאמון (30 נק').", "הסבר תפיסת הלקוח לגבי אבטחת הארגון וחוסר היכולת שלו להפריד בין רשתות פיתוח לייצור (35 נק').", "הצבעה על כשל בניהול נכסים (Asset Management) והעדר תהליך הסרת שרתים מיושנים (35 נק')."]}, {"shortTitle": "תרחיש 2: מעקף MFA בדואר ישראל", "title": "תרחיש 2: פרצה במנגנון אימות דו-שלבי (Israel Post Case Study)", "description": "קבוצת תקיפה גילתה שדואר ישראל השיק פורטל שירות עצמי (Self-Service) חדש להגדרת אימות דו-שלבי (MFA) עבור תיבות הדואר של העובדים. התוקפים ביצעו ניחוש סיסמאות (Credential Stuffing), גילו סיסמאות חלשות של מספר עובדים, התחברו בשמם לפורטל השירות העצמי והזינו את מספרי הטלפון של התוקפים כמספרים המאושרים לקבלת קוד ה-MFA. דרך זו אפשרה להם לעקוף את מנגנון ה-MFA ולהשיג גישה מלאה לתיבות המייל.\n\nשאלה: הגדר את סוג הפגיעות (טכנולוגית או תהליכית), הסבר כיצד השפיע השינוי על ציר ה-Kill Chain של התקיפה, ומהן הבקרות שהיה על הארגון ליישם בפורטל השירות העצמי כדי למנוע מעקף זה.", "answer": "1. **סוג הפגיעות**: פגיעות תהליכית/לוגית ולא טכנולוגית בלבד. מנגנון ה-MFA עצמו עבד באופן תקין קריפטוגרפית, אך הלוגיקה של פורטל השירות העצמי אפשרה שינוי פרטי אימות ללא אימות מוקדם חזק.\n2. **השפעה על ה-Kill Chain**: השינוי איפשר לתוקפים להשלים את שלב האחיזה הראשונית (Initial Compromise) ולבסס גישה יציבה ללא התרעה למערכות הארגון.\n3. **בקרות מומלצות למניעה**:\n   - דרישה לאישור מנהל מערכת או אימות מול פרטי עובד קיימים (כגון קוד אימות שנשלח למחלקת משאבי אנוש) לפני שינוי מספר ה-MFA.\n   - שליחת התרעה מיידית בערוץ נפרד (למשל, SMS למספר הישן או אימייל) המודיעה על שינוי פרטי ה-MFA.\n   - הגבלת גישה לפורטל השירות העצמי מתוך הרשת הארגונית בלבד או דרך רשתות מורשות.", "rubric": ["הגדרה כפגיעות תהליכית/לוגית במנגנון הרישום ולא כפרצה קריפטוגרפית (30 נק').", "הסבר ההשפעה על שלב האחיזה הראשונית ב-Kill Chain של ה-APT (30 נק').", "הצעת בקרות פיקוח: התרעה למספר הישן, הגבלת גישה לפורטל או אישור מנהל (40 נק')."]}, {"shortTitle": "תרחיש 3: מתקפת כופרה ב-OT מול IT", "title": "תרחיש 3: מתקפת כופרה במפעל ייצור בקבוקי קוקה קולה", "description": "מפעל ייצור חווה מתקפת כופרה. כלל שרתי ה-IT (מחשבי הנהלת חשבונות, שרתי דואר ומשרדים) הוצפנו על ידי התוקפים. מערכות ה-OT (בקרי ה-PLC השולטים בפסי הייצור של הבקבוקים) מבודדות וממשיכות לעבוד כרגיל ללא פגע. ה-CISO דורש להשבית מיד את כל המפעל, כולל פסי הייצור של ה-OT, כדי למנוע התפשטות לטרלית פוטנציאלית. מנהל המפעל מתנגד בטענה שהשבתה של פסי הייצור תגרום להפסד של מיליוני שקלים ביום.\n\nשאלה: הצג את דילמת הניהול במקרה זה, הסבר את העדיפויות השונות של CIA בין ה-IT ל-OT, ומהו הפתרון הארכיטקטוני המומלץ שיאפשר את המשך עבודת המפעל בבטחה.", "answer": "1. **דילמת הניהול**: הקונפליקט בין צוות האבטחה (המבקש להשבית את הייצור למניעת התפשטות האירוע ל-OT) לבין מנהל המפעל (המבקש המשכיות עסקית ומניעת הפסדים כלכליים ישירים).\n2. **הבדלי CIA**:\n   - ב-IT, העדיפות היא סודיות (Confidentiality) ושמירה על נתוני הארגון. הצפנתם היא אירוע קשה.\n   - ב-OT, העדיפות היא זמינות (Availability) ובטיחות פיזית. כל עוד הבקרים פועלים בבטחה, המשך הייצור קריטי.\n3. **פתרון ארכיטקטוני מומלץ**: ביצוע בידוד רשתות מוחלט (Air-Gapping) זמני בין ה-IT ל-OT ברמת חומות האש. מאחר שה-OT מבוסס על בקרים מקומיים, ניתן להמשיך את הייצור במצב מנותק אינטרנט/רשת משרדית, תוך ביצוע סריקות קפדניות וניקוי מוחלט של רשת ה-IT.", "rubric": ["הסבר מפורט של דילמת הניהול בין המשכיות הייצור לבין חסימת התפשטות האיום (30 נק').", "הצגת הבדלי ה-CIA: סודיות ב-IT מול זמינות ובטיחות ב-OT (35 נק').", "המלצה על פתרון המבוסס על בידוד רשתי (סגמנטציה/Air-gapping) זמני במקום השבתה מלאה (35 - נק')."]}, {"shortTitle": "תרחיש 4: דילמת הניתוק של שרת C2", "title": "תרחיש 4: זיהוי ערוץ תקשורת פעיל מול שרת שליטה ובקרה (C2)", "description": "צוות ה-SOC של ארגון פיננסי מזהה כי אחד משרתי מסד הנתונים הרגישים (Database Layer) מקיים תקשורת פעילה ומוצפנת החוצה אל כתובת IP לא מוכרת בחו\"ל, המזוהה במודיעין הסייבר כשרת שליטה ובקרה (C2) של קבוצת APT רוסית. מנהל התשתיות דורש לנתק פיזית את כבל הרשת של השרת מיד. חוקר הפורנזיקה הדיגיטלית מתנגד בתוקף.\n\nשאלה: הסבר את 'דילמת הניתוק' במקרה זה, מהן הסכנות בניתוק מיידי מול שרתי C2 של קבוצות APT מנוסות, וכיצד על הצוות לפעול.", "answer": "1. **דילמת הניתוק**: הקונפליקט בין עצירה מיידית של זליגת נתונים (על ידי ניתוק פיזית של הרשת) לבין הצורך לשמור על ראיות ולא לעורר את התוקף לפעולת הרס.\n2. **הסכנות בניתוק מיידי**:\n   - תוקפי APT מנוסים שותלים לעיתים קרובות מנגנוני הגנה עצמית (מתגי מוות - Kill Switches). ברגע שהנוזקה בשרת מזהה אובדן חיבור לשרת ה-C2, היא מניחה שהיא התגלתה ומפעילה מיידית פקודת הצפנה (כופרה) או מחיקת דיסקים כוללת כדי להרוס ראיות ולגרום נזק מקסימלי.\n   - ניתוק רשת גס ימנע ניטור תעבורה חי (Wireshark) ויקשה על הבנת היקף המידע שכבר דלף.\n3. **כיצד לפעול**:\n   - ביצוע גיבוי דחוף של זיכרון ה-RAM (Volatile Memory Capture) כדי לשמור את מפתחות ההצפנה ונוזקות שרצות בזיכרון בלבד.\n   - הגדרת חוקי Firewall ממוקדים (חסימה סלקטיבית של תקשורת ה-C2) או מעבר של השרת לסביבת Sandbox מבוקרת (Containment) במקום ניתוק רשת גס, כדי לאפשר לצוות ה-IR לבודד את המערכת בצורה מסודרת.", "rubric": ["הסבר מפורט של דילמת הניתוק: עצירת הדלף מול סיכון תגובה הרסנית של התוקף (35 נק').", "ציון מנגנוני 'מתגי מוות' (Kill Switches) ומחיקה עצמית של נוזקות APT בעת זיהוי ניתוק (35 נק').", "המלצה על איסוף זיכרון RAM תחילה והעברה להכלה מבוקרת (Containment) במקום ניתוק גס (30 נק')."]}];

    <!-- State & UI Engine -->
    <script>
        let currentTab = 'guide'; 
        let currentLesson = 1;
        let masteredCheckpoints = {}; 
        let cardMasteredState = {}; 
        let quizAnswers = {}; 
        let currentCardIndex = 0;
        let currentQuizIndex = 0;
        let currentOpenIndex = 0;
        let scenarioDrafts = {}; 
        let tempCheckpointAnswers = {};
        let isMuted = false;

        // Clean simple markdown bold/italic parser to really bold strings
        function parseSimpleMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="font-extrabold text-cyan-400">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="italic text-slate-300">$1</em>')
                .replace(/\n/g, '<br>');
        }

        // Dynamic Subnavigation builder based on loaded lessons
        function renderSubnavigation() {
            const subnav = document.getElementById('lesson-subnavigation');
            subnav.innerHTML = '';
            
            for (let lId in lessonsData) {
                const lesson = lessonsData[lId];
                const isCurrent = parseInt(lId) === currentLesson;
                
                const btn = document.createElement('button');
                btn.id = `lesson-nav-${lId}`;
                btn.onclick = () => selectLesson(parseInt(lId));
                btn.className = isCurrent 
                    ? "w-full text-right py-2 px-2.5 rounded-lg text-sm font-semibold text-cyan-400 bg-cyan-500/10 border-r-2 border-cyan-500 transition block shrink-0"
                    : "w-full text-right py-2 px-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-200 transition block shrink-0";
                
                // Get short title from lesson title
                const shortTitle = lesson.title.split(':')[1].trim();
                btn.innerText = `שיעור ${lId}: ${shortTitle}`;
                
                subnav.appendChild(btn);
            }
        }

        function scrollToPresentations() {
            dismissWelcomePop(false);
            if (currentTab !== 'guide') {
                changeActiveTab('guide');
            }
            setTimeout(() => {
                const el = document.getElementById('lesson-presentation-viewer');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            }, 150);
        }

        function dismissWelcomePop(permanent) {
            const pop = document.getElementById('welcome-popup');
            if (pop) {
                pop.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
                pop.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
                if (permanent) {
                    localStorage.setItem('cyber_hasSeenWelcomePop', 'true');
                }
            }
        }

        function saveState() {
            localStorage.setItem('cyber_masteredCheckpoints', JSON.stringify(masteredCheckpoints));
            localStorage.setItem('cyber_cardMasteredState', JSON.stringify(cardMasteredState));
            localStorage.setItem('cyber_quizAnswers', JSON.stringify(quizAnswers));
            localStorage.setItem('cyber_scenarioDrafts', JSON.stringify(scenarioDrafts));
            localStorage.setItem('cyber_tempCheckpointAnswers', JSON.stringify(tempCheckpointAnswers));
            localStorage.setItem('cyber_currentTab', currentTab);
            localStorage.setItem('cyber_currentLesson', currentLesson.toString());
        }

        function loadState() {
            try {
                masteredCheckpoints = JSON.parse(localStorage.getItem('cyber_masteredCheckpoints')) || {};
                cardMasteredState = JSON.parse(localStorage.getItem('cyber_cardMasteredState')) || {};
                quizAnswers = JSON.parse(localStorage.getItem('cyber_quizAnswers')) || {};
                scenarioDrafts = JSON.parse(localStorage.getItem('cyber_scenarioDrafts')) || {};
                tempCheckpointAnswers = JSON.parse(localStorage.getItem('cyber_tempCheckpointAnswers')) || {};
                currentTab = localStorage.getItem('cyber_currentTab') || 'guide';
                currentLesson = parseInt(localStorage.getItem('cyber_currentLesson')) || 1;
            } catch (e) {
                console.error("Error loading state from localStorage", e);
                masteredCheckpoints = {};
                cardMasteredState = {};
                quizAnswers = {};
                scenarioDrafts = {};
                tempCheckpointAnswers = {};
                currentTab = 'guide';
                currentLesson = 1;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Force reset values of all inputs and textareas on load to prevent browser cache
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if (el.type === 'checkbox' || el.type === 'radio') {
                    el.checked = false;
                } else {
                    el.value = '';
                }
            });

            loadState();

            // Setup navigation counts
            document.getElementById('flashcard-nav-label').innerText = `כרטיסיות שינון (${flashcardsData.length})`;
            document.getElementById('simulator-nav-label').innerText = `סימולטור מבחן`;

            changeActiveTab(currentTab);
            renderSubnavigation();
            updateHUD();
            renderCurrentView();

            // Welcome Popup check (show on load unless muted)
            if (!localStorage.getItem('cyber_hasSeenWelcomePop')) {
                setTimeout(() => {
                    const pop = document.getElementById('welcome-popup');
                    if (pop) {
                        pop.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
                        pop.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
                        playChimeSound();
                    }
                }, 1500);
            }
        });

        function changeActiveTab(tabId) {
            currentTab = tabId;
            if (typeof saveState === 'function') saveState();
            
            ['guide', 'mitre', 'flashcards', 'simulator', 'dashboard'].forEach(t => {
                const btn = document.getElementById(`nav-btn-${t}`);
                if (t === tabId) {
                    btn.className = "w-full text-right py-2.5 px-3 rounded-xl bg-cyan-950/40 text-cyan-400 border border-cyan-500/20 text-base font-bold transition flex items-center gap-2";
                } else {
                    btn.className = "w-full text-right py-2.5 px-3 rounded-xl text-slate-400 hover:bg-slate-900/40 text-base font-bold transition flex items-center gap-2";
                }
            });

            const subnav = document.getElementById('lesson-subnavigation');
            if (tabId === 'guide') {
                subnav.classList.remove('hidden');
            } else {
                subnav.classList.add('hidden');
            }

            renderCurrentView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectLesson(lessonId) {
            currentLesson = lessonId;
            if (typeof saveState === 'function') saveState();
            renderSubnavigation();
            renderCurrentView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateHUD() {
            let totalCheckpoints = 0;
            for (let lId in lessonsData) {
                totalCheckpoints += lessonsData[lId].concepts.length;
            }
            
            const completedCount = Object.keys(masteredCheckpoints).filter(k => masteredCheckpoints[k] === true).length;
            document.getElementById('mastered-concepts-count').innerText = `${completedCount}/${totalCheckpoints}`;
            
            const percent = totalCheckpoints > 0 ? Math.round((completedCount / totalCheckpoints) * 100) : 0;
            document.getElementById('global-mastery-text').innerText = `${percent}%`;
            document.getElementById('global-mastery-bar').style.width = `${percent}%`;
        }

        function renderCurrentView() {
            const wrapper = document.getElementById('dynamic-content-wrapper');
            
            if (currentTab === 'guide') {
                renderLessonGuide(wrapper);
            } else if (currentTab === 'mitre') {
                renderMitreLab(wrapper);
            } else if (currentTab === 'flashcards') {
                renderFlashcardsLab(wrapper);
            } else if (currentTab === 'simulator') {
                renderExamSimulator(wrapper);
            } else if (currentTab === 'dashboard') {
                renderDashboardAnalytics(wrapper);
            }
        }

        // ------------------ VIEW RENDERERS ------------------

        function renderLessonGuide(container) {
            const lesson = lessonsData[currentLesson];
            const totalLessons = Object.keys(lessonsData).length;
            
            let html = `
                <div class="space-y-6">
                    <div class="glass-card rounded-2xl p-6 border border-slate-800 relative overflow-hidden">
                        <div class="absolute -right-16 -top-16 w-36 h-36 bg-cyan-500/5 rounded-full blur-2xl pointer-events-none"></div>
                        <div class="relative z-10">
                            <span class="text-sm font-bold text-cyan-400 uppercase tracking-widest font-tech">שיעור ${currentLesson} מתוך ${totalLessons}</span>
                            <h2 class="text-3xl font-extrabold text-white mt-1 mb-2">${lesson.title}</h2>
                            <p class="text-slate-300 text-base leading-relaxed">${parseSimpleMarkdown(lesson.introduction)}</p>
                        </div>
                    </div>

                    <div class="space-y-6">
            `;

            lesson.concepts.forEach((concept, index) => {
                const isMastered = masteredCheckpoints[concept.checkpoint.id] === true;

        function calculateQuizScore() {
            let correct = 0;
            let answered = 0;
            mcQuestions.forEach((q, idx) => {
                if (quizAnswers[idx] !== undefined) {
                    answered++;
                    if (quizAnswers[idx] === q.answerIndex) correct++;
                }
            });
            const score = answered > 0 ? Math.round((correct / mcQuestions.length) * 100) : 0;
            const badge = document.getElementById('sim-score-badge');
            if (badge) badge.innerText = `ציון: ${score}%`;
        }

            document.getElementById('reveal-scen-btn-text').innerText = "חשוף תשובת מודל ומחוון בדיקה";

            renderScenariosButtons();

            // Save draft to memory
            document.getElementById('scen-user-input').oninput = (e) => {

                saveState();
