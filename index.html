                answer: "סוג הפגיעות שנוצלה הוא פגיעות One-Day (או מתקפת One-Day).\n\nהסבר:\n1. ההגדרה: ברגע שהיצרן פרסם את הפאץ', הפגיעות הפכה מ-Zero-day (סודית) ל-One-day (ידועה לכל). התוקפים מנתחים את התיקון כדי להבין בדיוק איך לנצל את הפרצה.\n2. חלון הזמן המסוכן: זהו מרוץ חימוש. תוקפים סורקים באופן אוטומטי אלפי כתובות IP כדי לאתר ארגונים שטרם התקינו את הפאץ'. דחיית העדכון ב-4 ימים יצרה חלון הזדמנות מושלם לתוקפים.\n3. הפעולה הנדרשת: עבור רכיב גישה מרכזי וחשוף לאינטרנט כמו VPN, הארגון היה חייב לבצע התקנת חירום מיידית של הפאץ' ללא השהיה, תוך שימוש באסטרטגיית שדרוג של 'קלאסטר' או תיאום חלון השבתה קצר של חצי שעה בלילה.",
                rubric: [
                    "הגדרה נכונה כפגיעות One-Day (30 נק').",
                    "הסבר מרוץ החימוש והסריקות האקטיביות של תוקפים מיד לאחר פרסום הפאץ' (40 נק').",
                    "המלצה על התקנת חירום מיידית וניהול פאצ'ים מבוקר אך מהיר (30 נק')."
                ]
            }
        ];
    </script>

    <!-- State & UI Engine -->
    <script>
        let currentTab = 'guide'; // 'guide', 'flashcards', 'simulator', 'dashboard'
        let currentLesson = 1;
        let masteredCheckpoints = {}; // { 'l1_q1': true }
        let currentCardIndex = 0;
        let cardMasteredState = {}; // { cardIdx: true/false }
        let currentQuizIndex = 0;
        let quizAnswers = {}; // { qIdx: selectedOptIdx }
        let currentOpenIndex = 0;
        let isMuted = false;

        // Load state from localStorage on init
        window.addEventListener('DOMContentLoaded', () => {
            const savedCheckpoints = localStorage.getItem('cyber_mastered_checkpoints');
            if (savedCheckpoints) masteredCheckpoints = JSON.parse(savedCheckpoints);
            
            const savedCards = localStorage.getItem('cyber_card_states');
            if (savedCards) cardMasteredState = JSON.parse(savedCards);

            const savedQuiz = localStorage.getItem('cyber_quiz_answers');
            if (savedQuiz) quizAnswers = JSON.parse(savedQuiz);

            updateHUD();
            renderCurrentView();
        });

        function changeActiveTab(tabId) {
            currentTab = tabId;
            
            // Manage UI navigation styling
            ['guide', 'flashcards', 'simulator', 'dashboard'].forEach(t => {
                const btn = document.getElementById(`nav-btn-${t}`);
                if (t === tabId) {
                    btn.className = "w-full text-right py-2 px-3 rounded-xl bg-cyan-950/40 text-cyan-400 border border-cyan-500/20 text-sm font-bold transition flex items-center gap-2";
                } else {
                    btn.className = "w-full text-right py-2 px-3 rounded-xl text-slate-400 hover:bg-slate-900/40 text-sm font-bold transition flex items-center gap-2";
                }
            });

            // Toggle Lesson selector subnav visibility
            const subnav = document.getElementById('lesson-subnavigation');
            if (tabId === 'guide') {
                subnav.classList.remove('hidden');
            } else {
                subnav.classList.add('hidden');
            }

            renderCurrentView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectLesson(lessonId) {
            currentLesson = lessonId;
            
            // Highlight subnav
            for (let i = 1; i <= 5; i++) {
                const btn = document.getElementById(`lesson-nav-${i}`);
                if (i === lessonId) {
                    btn.className = "w-full text-right py-1.5 px-2 rounded-lg text-xs font-medium text-cyan-400 bg-cyan-500/10 border-r-2 border-cyan-500 transition";
                } else {
                    btn.className = "w-full text-right py-1.5 px-2 rounded-lg text-xs font-medium text-slate-400 hover:text-slate-200 transition";
                }
            }

            renderCurrentView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateHUD() {
            // Count completed inline checkpoints (total 10 checkpoints across 5 lessons)
            const completedCount = Object.keys(masteredCheckpoints).filter(k => masteredCheckpoints[k] === true).length;
            document.getElementById('mastered-concepts-count').innerText = `${completedCount}/10`;
            
            // Mastery percent
            const percent = Math.round((completedCount / 10) * 100);
            document.getElementById('global-mastery-text').innerText = `${percent}%`;
            document.getElementById('global-mastery-bar').style.width = `${percent}%`;
        }

        function renderCurrentView() {
            const wrapper = document.getElementById('dynamic-content-wrapper');
            
            if (currentTab === 'guide') {
                renderLessonGuide(wrapper);
            } else if (currentTab === 'flashcards') {
                renderFlashcardsLab(wrapper);
            } else if (currentTab === 'simulator') {
                renderExamSimulator(wrapper);
            } else if (currentTab === 'dashboard') {
                renderDashboardAnalytics(wrapper);
            }
        }

        // ------------------ VIEW RENDERERS ------------------

        function renderLessonGuide(container) {
            const lesson = lessonsData[currentLesson];
            
            let html = `
                <div class="space-y-6">
                    <!-- Lesson Intro Card -->
                    <div class="glass-card rounded-2xl p-6 border border-slate-800 relative overflow-hidden">
                        <div class="absolute -right-16 -top-16 w-36 h-36 bg-cyan-500/5 rounded-full blur-2xl pointer-events-none"></div>
                        <div class="relative z-10">
                            <span class="text-xs font-bold text-cyan-400 uppercase tracking-widest font-tech">שיעור ${currentLesson} מתוך 5</span>
                            <h2 class="text-2xl font-extrabold text-white mt-1 mb-2">${lesson.title}</h2>
                            <p class="text-slate-300 text-sm leading-relaxed">${lesson.introduction}</p>
                        </div>
                    </div>

                    <!-- Lesson Concepts -->
                    <div class="space-y-6">
            `;

            lesson.concepts.forEach((concept, index) => {
                const isMastered = masteredCheckpoints[concept.checkpoint.id] === true;
                
                html += `
                    <div class="glass-card rounded-2xl border border-slate-800 overflow-hidden">
                        <!-- Concept Header -->
                        <div class="p-5 bg-slate-900/40 border-b border-slate-800 flex items-center justify-between">
                            <h3 class="font-bold text-slate-200 text-base md:text-lg">${concept.title}</h3>
                            <span id="badge-${concept.checkpoint.id}" class="text-xs font-bold px-2.5 py-1 rounded-full ${
                                isMastered 
                                    ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' 
                                    : 'bg-slate-800 text-slate-400 border border-slate-700/60'
                            }">
                                ${isMastered ? '✓ נלמד ושולב' : 'טרם נלמד'}
                            </span>
                        </div>

                        <!-- Concept Body -->
                        <div class="p-5 md:p-6 space-y-4 text-slate-300 text-sm leading-relaxed">
                            <p class="whitespace-pre-line">${concept.text}</p>
                            
                            <!-- Examiner Box -->
                            <div class="p-4 rounded-xl bg-cyan-950/20 border border-cyan-500/15 flex gap-3">
                                <div class="w-8 h-8 rounded-full bg-cyan-500/10 text-cyan-400 flex items-center justify-center shrink-0">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                                </div>
                                <div class="text-xs leading-relaxed text-slate-400">
                                    <strong class="text-cyan-400 block text-xs mb-1">טיפ מפתח למעריך הבחינה (השאלות הפתוחות):</strong>
                                    ${concept.examinerTip}
                                </div>
                            </div>

                            <!-- Inline Checkpoint (Question) -->
                            <div class="border-t border-slate-800/80 pt-5 mt-5">
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="w-1.5 h-3 bg-indigo-500 rounded"></span>
                                    <h4 class="font-bold text-slate-200 text-xs tracking-wide uppercase">בוחן הבנה מהיר (Inline Checkpoint)</h4>
                                </div>
                                <p class="text-sm font-semibold text-white mb-4">${concept.checkpoint.question}</p>
                                
                                <div class="grid grid-cols-1 gap-2.5">
                `;

                concept.checkpoint.options.forEach((opt, oIdx) => {
                    const checkId = concept.checkpoint.id;
                    const checkpointAnswered = localStorage.getItem(`answered_${checkId}`) !== null;
                    const savedAns = localStorage.getItem(`answered_${checkId}`);
                    const isSelected = savedAns !== null && parseInt(savedAns) === oIdx;
                    const isCorrectOption = oIdx === concept.checkpoint.correct;

                    let btnStyle = "border-slate-800 bg-slate-950/20 hover:bg-slate-900/30 text-slate-300";
                    let badgeIcon = `<span class="w-5 h-5 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-slate-500 shrink-0">${oIdx+1}</span>`;

                    if (checkpointAnswered) {
                        if (isCorrectOption) {
                            btnStyle = "border-emerald-500/30 bg-emerald-500/5 text-emerald-300";
                            badgeIcon = `<span class="w-5 h-5 rounded-full bg-emerald-500 text-slate-950 flex items-center justify-center text-xs font-bold shrink-0">✓</span>`;
                        } else if (isSelected) {
                            btnStyle = "border-rose-500/30 bg-rose-500/5 text-rose-300";
                            badgeIcon = `<span class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-xs font-bold shrink-0">✗</span>`;
                        } else {
                            btnStyle = "border-slate-850 bg-slate-950/10 opacity-50 text-slate-400";
                        }
                    }

                    html += `
                        <button onclick="answerCheckpoint('${checkId}', ${oIdx}, ${concept.checkpoint.correct})" ${checkpointAnswered ? 'disabled' : ''} 
                                class="w-full text-right p-3.5 rounded-xl border text-xs leading-relaxed transition flex items-start gap-3 ${btnStyle}">
                            ${badgeIcon}
                            <span>${opt}</span>
                        </button>
                    `;
                });

                html += `
                                </div>
                                
                                <!-- Explanation Box (Visible if answered) -->
                                <div id="expl-${concept.checkpoint.id}" class="mt-4 p-4 rounded-xl bg-slate-950/60 border border-slate-800 text-xs leading-relaxed text-slate-400 ${
                                    localStorage.getItem(`answered_${concept.checkpoint.id}`) !== null ? '' : 'hidden'
                                }">
                                    <strong class="text-indigo-400 block mb-1">הסבר המרצה:</strong>
                                    כאשר עונים על שאלות כאלו במבחן, חשוב לזכור את הרקע והסיבה לבחירה. במקרה זה, הפתרון הנכון נובע מכך ש-${
                                        concept.checkpoint.options[concept.checkpoint.correct]
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    
                    <!-- Bottom Nav -->
                    <div class="flex justify-between items-center border-t border-slate-800 pt-6">
                        <button onclick="selectLesson(${Math.max(1, currentLesson - 1)})" ${currentLesson === 1 ? 'disabled' : ''} 
                                class="px-4 py-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-300 text-xs font-semibold hover:bg-slate-800 transition disabled:opacity-50">
                            השיעור הקודם
                        </button>
                        <span class="text-xs font-bold text-slate-400 font-tech">שיעור ${currentLesson} מתוך 5</span>
                        <button onclick="selectLesson(${Math.min(5, currentLesson + 1)})" ${currentLesson === 5 ? 'disabled' : ''} 
                                class="px-4 py-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-300 text-xs font-semibold hover:bg-slate-800 transition disabled:opacity-50">
                            השיעור הבא
                        </button>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function answerCheckpoint(checkpointId, selectedIdx, correctIdx) {
            localStorage.setItem(`answered_${checkpointId}`, selectedIdx);
            
            const isCorrect = selectedIdx === correctIdx;
            masteredCheckpoints[checkpointId] = isCorrect;
            localStorage.setItem('cyber_mastered_checkpoints', JSON.stringify(masteredCheckpoints));

            updateHUD();
            renderCurrentView();
            playChimeSound();
            showToast(isCorrect ? "תשובה נכונה! רכשת שליטה במושג זה" : "תשובה לא נכונה. עבור על ההסבר המלא");
        }

        function renderFlashcardsLab(container) {
            const card = flashcardsData[currentCardIndex];
            const isMastered = cardMasteredState[currentCardIndex] === true;

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="glass-card rounded-2xl p-6 border border-slate-800 text-center max-w-xl mx-auto">
                        <h2 class="text-xl font-extrabold text-white mb-1">מעבדת כרטיסיות Active Recall</h2>
                        <p class="text-xs text-slate-400">נסה לענות על השאלה בקול רם, לחץ על הכרטיסייה כדי לראות את הפתרון, ודרג את רמת השליטה שלך.</p>
                    </div>

                    <!-- 3D Card -->
                    <div class="flex justify-center my-6">
                        <div class="w-full max-w-2xl h-80 perspective-1000">
                            <div id="flashcard-inner" onclick="flipCard()" class="w-full h-full preserve-3d cursor-pointer relative rounded-2xl border border-slate-800 bg-slate-950/80 shadow-2xl shadow-cyan-500/5 transition-transform duration-500">
                                
                                <!-- Front -->
                                <div class="absolute inset-0 backface-hidden p-8 flex flex-col justify-between rounded-2xl">
                                    <div class="flex justify-between items-center">
                                        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wider uppercase bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">${card.category}</span>
                                        <span class="text-xs font-tech text-slate-500">${currentCardIndex + 1} / ${flashcardsData.length}</span>
                                    </div>
                                    <div class="text-center my-auto">
                                        <p class="text-base md:text-lg font-bold leading-relaxed text-white">${card.question}</p>
                                    </div>
                                    <div class="text-center text-xs text-slate-500 flex items-center justify-center gap-1.5">
                                        <svg class="w-4 h-4 text-cyan-500 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                        לחץ על הכרטיסייה לחשיפת הפתרון
                                    </div>
                                </div>

                                <!-- Back -->
                                <div class="absolute inset-0 backface-hidden rotate-y-180 p-6 md:p-8 flex flex-col justify-between bg-slate-950 rounded-2xl overflow-y-auto">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-[10px] font-bold uppercase text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20">הסבר מחוון התשובה</span>
                                        <span class="text-xs text-slate-500">${currentCardIndex + 1} / ${flashcardsData.length}</span>
                                    </div>
                                    <div class="my-auto text-sm leading-relaxed text-slate-300">
                                        <p class="whitespace-pre-line">${card.answer}</p>
                                    </div>
                                    <div class="text-center text-[10px] text-cyan-500 mt-2">
                                        לחץ שוב כדי להפוך חזרה
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Navigation and Self-Evaluation -->
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 max-w-2xl mx-auto border-t border-slate-800/80 pt-6">
                        <div class="flex gap-2">
                            <button onclick="navigateCard(-1)" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 transition flex items-center gap-1 text-sm font-semibold">
                                <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                קודם
                            </button>
                            <button onclick="navigateCard(1)" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 transition flex items-center gap-1 text-sm font-semibold">
                                הבא
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex gap-3 w-full sm:w-auto">
                            <button onclick="setCardMastery(true)" class="flex-1 sm:flex-initial px-4 py-2.5 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 ${
                                isMastered 
                                    ? 'bg-emerald-500 text-slate-950 shadow-lg shadow-emerald-500/20' 
                                    : 'bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'
                            }">
                                👍 ידעתי מצוין
                            </button>
                            <button onclick="setCardMastery(false)" class="flex-1 sm:flex-initial px-4 py-2.5 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 ${
                                !isMastered && cardMasteredState[currentCardIndex] !== undefined
                                    ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/20'
                                    : 'bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30'
                            }">
                                🔁 דורש חזרה
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function flipCard() {
            document.getElementById('flashcard-inner').classList.toggle('flipped');
        }

        function navigateCard(dir) {
            currentCardIndex = (currentCardIndex + dir + flashcardsData.length) % flashcardsData.length;
            renderCurrentView();
        }

        function setCardMastery(mastered) {
            cardMasteredState[currentCardIndex] = mastered;
            localStorage.setItem('cyber_card_states', JSON.stringify(cardMasteredState));
            showToast(mastered ? 'סומן כנלמד בהצלחה!' : 'סומן כדורש חזרה בבלוק 6');
            playChimeSound();
            renderCurrentView();
        }

        function renderExamSimulator(container) {
            container.innerHTML = `
                <div class="space-y-8">
                    <!-- Mode Selector -->
                    <div class="flex justify-center gap-4 bg-slate-900/40 p-1.5 rounded-xl border border-slate-800/80 max-w-md mx-auto">
                        <button onclick="switchSimMode('mc')" id="sim-mode-mc-btn" class="flex-1 py-2 text-xs font-bold rounded-lg bg-cyan-500 text-slate-950 transition">
                            שאלות אמריקאיות (8)
                        </button>
                        <button onclick="switchSimMode('open')" id="sim-mode-open-btn" class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition">
                            תרחישי אירוע פתוחים (3)
                        </button>
                    </div>

                    <!-- MULTIPLE CHOICE COMPONENT -->
                    <div id="sim-mc-content" class="max-w-3xl mx-auto space-y-6">
                        <div class="flex justify-between items-center border-b border-slate-850 pb-3">
                            <div>
                                <h3 class="font-bold text-white text-lg">שאלות רב-ברירה</h3>
                                <p class="text-xs text-slate-400">בחינה מהירה של כלל נושאי הקורס</p>
                            </div>
                            <span id="sim-score-badge" class="text-sm font-semibold bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-3 py-1 rounded-full font-tech">ציון: 0</span>
                        </div>

                        <!-- Question Display -->
                        <div id="sim-question-card">
                            <!-- Injected by renderSimQuestion() -->
                        </div>
                    </div>

                    <!-- SCENARIOS COMPONENT -->
                    <div id="sim-open-content" class="max-w-3xl mx-auto space-y-6 hidden">
                        <div class="border-b border-slate-850 pb-3">
                            <h3 class="font-bold text-white text-lg">תרחישי אירוע פתוחים</h3>
                            <p class="text-xs text-slate-400">תרגיל מבוסס סימולציות - כתוב טיוטה והשווה למחוון המרצה</p>
                        </div>
                        
                        <!-- Scenario buttons selection -->
                        <div class="flex gap-2">
                            <button onclick="selectOpenScenarioSim(0)" id="scen-btn-0" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-cyan-950/30 text-cyan-400 border border-cyan-500/20">תרחיש 1: בינת תוכנה</button>
                            <button onclick="selectOpenScenarioSim(1)" id="scen-btn-1" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900/50 text-slate-400 border border-slate-800">תרחיש 2: כופרה ב-OT</button>
                            <button onclick="selectOpenScenarioSim(2)" id="scen-btn-2" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900/50 text-slate-400 border border-slate-800">תרחיש 3: התקפת One-Day</button>
                        </div>

                        <div class="glass-card rounded-2xl p-6 border border-slate-800 space-y-6">
                            <h4 id="scen-title-display" class="text-lg font-bold text-white"></h4>
                            <p id="scen-desc-display" class="text-sm text-slate-350 leading-relaxed"></p>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-2">טיוטת התשובה שלך (תרגול אקטיבי):</label>
                                <textarea id="scen-user-input" rows="4" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500/50" placeholder="הקלד כאן את נקודות המפתח..."></textarea>
                            </div>

                            <button onclick="toggleScenAnswerDisplay()" class="w-full py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold transition">
                                <span id="reveal-scen-btn-text">חשוף תשובת מודל ומחוון בדיקה</span>
                            </button>

                            <!-- Hidden Model Box -->
                            <div id="scen-model-box" class="mt-4 p-5 rounded-xl bg-slate-950 border border-slate-850 text-sm space-y-4 hidden">
                                <div>
                                    <h5 class="font-bold text-cyan-400 mb-1">תשובת מודל מלאה:</h5>
                                    <p id="scen-model-ans-text" class="text-slate-300 leading-relaxed whitespace-pre-line"></p>
                                </div>
                                <div class="border-t border-slate-800/80 pt-3">
                                    <h5 class="font-bold text-emerald-400 mb-1">מחוון ניקוד של הבודק (Rubric):</h5>
                                    <ul id="scen-model-rubric" class="list-disc list-inside space-y-1 text-xs text-slate-400">
                                        <!-- Rubrics list -->
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Init questions
            calculateQuizScore();
            renderSimQuestion();
        }

        let simMode = 'mc';
        
        function switchSimMode(mode) {
            simMode = mode;
            const mcContent = document.getElementById('sim-mc-content');
            const openContent = document.getElementById('sim-open-content');
            const mcBtn = document.getElementById('sim-mode-mc-btn');
            const openBtn = document.getElementById('sim-mode-open-btn');

            if (mode === 'mc') {
                mcContent.classList.remove('hidden');
                openContent.classList.add('hidden');
                mcBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-cyan-500 text-slate-950 transition";
                openBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition";
                renderSimQuestion();
            } else {
                mcContent.classList.add('hidden');
                openContent.classList.remove('hidden');
                mcBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition";
                openBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-cyan-500 text-slate-950 transition";
                selectOpenScenarioSim(currentOpenIndex);
            }
        }

        function renderSimQuestion() {
            const card = document.getElementById('sim-question-card');
            if (!card) return;

            const q = mcQuestions[currentQuizIndex];
            const hasSelected = quizAnswers[currentQuizIndex] !== undefined;
            const selectedOpt = quizAnswers[currentQuizIndex];

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let btnStyle = "border-slate-800 bg-slate-950/40 hover:bg-slate-900/40 text-slate-350";
                let badge = `<span class="w-5 h-5 rounded-full border border-slate-700 flex items-center justify-center text-xs text-slate-500 shrink-0">${idx+1}</span>`;

                if (hasSelected) {
                    if (idx === q.answerIndex) {
                        btnStyle = "border-emerald-500/40 bg-emerald-500/5 text-emerald-350";
                        badge = `<span class="w-5 h-5 rounded-full bg-emerald-500 text-slate-950 flex items-center justify-center text-xs font-bold shrink-0">✓</span>`;
                    } else if (idx === selectedOpt) {
                        btnStyle = "border-rose-500/40 bg-rose-500/5 text-rose-350";
                        badge = `<span class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-xs font-bold shrink-0">✗</span>`;
                    } else {
                        btnStyle = "border-slate-850 bg-slate-950/20 opacity-60 text-slate-400";
                    }
                }

                optionsHtml += `
                    <button onclick="selectSimAnswer(${idx})" ${hasSelected ? 'disabled' : ''} 
                            class="w-full text-right p-4 rounded-xl border transition text-xs md:text-sm flex items-start gap-3 ${btnStyle}">
                        ${badge}
                        <span class="leading-relaxed">${opt}</span>
                    </button>
                `;
            });

            card.innerHTML = `
                <div class="glass-card rounded-2xl p-6 border border-slate-800 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="px-2 py-0.5 text-[9px] font-bold rounded bg-slate-800 text-slate-400 uppercase tracking-wide">${q.category}</span>
                        <span class="text-xs font-tech text-slate-500">${currentQuizIndex + 1} / ${mcQuestions.length}</span>
                    </div>
                    <h4 class="text-sm md:text-base font-bold text-white mb-4 leading-relaxed">${q.question}</h4>
                    
                    <div class="space-y-3">
                        ${optionsHtml}
                    </div>

                    <!-- Explanation -->
                    <div class="mt-4 p-4 rounded-xl bg-slate-950/65 border border-slate-850 text-xs leading-relaxed text-slate-400 ${hasSelected ? '' : 'hidden'}">
                        <strong class="text-indigo-400 block mb-1">הסבר המרצה לתשובה:</strong>
                        ${q.explanation}
                    </div>

                    <!-- Navigation inside simulation -->
                    <div class="flex justify-between border-t border-slate-850 pt-5 mt-5">
                        <button onclick="navigateSimQuestion(-1)" class="px-3.5 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold transition">שאלה קודמת</button>
                        <button onclick="navigateSimQuestion(1)" class="px-3.5 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold transition">שאלה הבאה</button>
                    </div>
                </div>
            `;
        }

        function selectSimAnswer(optIdx) {
            quizAnswers[currentQuizIndex] = optIdx;
            localStorage.setItem('cyber_quiz_answers', JSON.stringify(quizAnswers));
            calculateQuizScore();
            renderSimQuestion();
            playChimeSound();
        }

        function navigateSimQuestion(dir) {
            currentQuizIndex = (currentQuizIndex + dir + mcQuestions.length) % mcQuestions.length;
            renderSimQuestion();
        }

        function calculateQuizScore() {
            let correct = 0;
            let answered = 0;
            mcQuestions.forEach((q, idx) => {
                if (quizAnswers[idx] !== undefined) {
                    answered++;
                    if (quizAnswers[idx] === q.answerIndex) correct++;
                }
            });
            const score = answered > 0 ? Math.round((correct / mcQuestions.length) * 100) : 0;
            const badge = document.getElementById('sim-score-badge');
            if (badge) badge.innerText = `ציון: ${score}%`;
        }

        // Open Simulator Scenario selector
        function selectOpenScenarioSim(idx) {
            currentOpenIndex = idx;
            const scen = openScenarios[idx];
            
            document.getElementById('scen-title-display').innerText = scen.title;
            document.getElementById('scen-desc-display').innerText = scen.description;
            
            // Reset input draft
            document.getElementById('scen-user-input').value = localStorage.getItem(`draft_scen_${idx}`) || '';
            document.getElementById('scen-model-box').classList.add('hidden');
            document.getElementById('reveal-scen-btn-text').innerText = "חשוף תשובת מודל ומחוון בדיקה";

            // Active button classes styling
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`scen-btn-${i}`);
                if (i === idx) {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-bold bg-cyan-950/30 text-cyan-400 border border-cyan-500/20";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-900/50 text-slate-400 border border-slate-800";
                }
            }

            // Save draft input
            document.getElementById('scen-user-input').oninput = (e) => {
                localStorage.setItem(`draft_scen_${idx}`, e.target.value);
            };
        }

        function toggleScenAnswerDisplay() {
            const box = document.getElementById('scen-model-box');
            const txt = document.getElementById('reveal-scen-btn-text');
            const scen = openScenarios[currentOpenIndex];

            if (box.classList.contains('hidden')) {
                box.classList.remove('hidden');
                txt.innerText = "הסתר תשובת מודל ומחוון";
                
                document.getElementById('scen-model-ans-text').innerText = scen.answer;
                
                const rubricUl = document.getElementById('scen-model-rubric');
                rubricUl.innerHTML = '';
                scen.rubric.forEach(r => {
                    const li = document.createElement('li');
                    li.innerText = r;
                    rubricUl.appendChild(li);
                });
                playChimeSound();
            } else {
                box.classList.add('hidden');
                txt.innerText = "חשוף תשובת מודל ומחוון בדיקה";
            }
        }

        function renderDashboardAnalytics(container) {
            // Analytics logic
            const inlineMastered = Object.keys(masteredCheckpoints).filter(k => masteredCheckpoints[k] === true).length;
            const flashcardMastered = Object.keys(cardMasteredState).filter(k => cardMasteredState[k] === true).length;
            
            let quizCorrect = 0;
            let quizTotal = 0;
            mcQuestions.forEach((q, idx) => {
                if (quizAnswers[idx] !== undefined) {
                    quizTotal++;
                    if (quizAnswers[idx] === q.answerIndex) quizCorrect++;
                }
            });

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="glass-card rounded-2xl p-6 border border-slate-800">
                        <h2 class="text-xl font-extrabold text-white mb-2">מרכז שליטה וסטטיסטיקת למידה</h2>
                        <p class="text-xs text-slate-400">נתח את קצב ההתקדמות שלך לקראת הבחינה</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Stat 1 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs font-bold text-slate-400 block">בחני הבנה (Inline)</span>
                            <span class="text-3xl font-extrabold text-cyan-400 font-tech block">${inlineMastered} / 10</span>
                            <span class="text-[10px] text-slate-500 block">הושלמו מתוך חומר הלימוד</span>
                        </div>
                        <!-- Stat 2 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs font-bold text-slate-400 block">כרטיסיות ששוננו (Flashcards)</span>
                            <span class="text-3xl font-extrabold text-indigo-400 font-tech block">${flashcardMastered} / 15</span>
                            <span class="text-[10px] text-slate-500 block">סומנו כ-'ידעתי מצוין'</span>
                        </div>
                        <!-- Stat 3 -->
                        <div class="glass-card rounded-xl p-5 border border-slate-800 text-center space-y-2">
                            <span class="text-xs font-bold text-slate-400 block">סימולציית בחירה מרובה</span>
                            <span class="text-3xl font-extrabold text-emerald-400 font-tech block">${quizTotal > 0 ? Math.round((quizCorrect/quizTotal)*100) : 0}%</span>
                            <span class="text-[10px] text-slate-500 block">ציון ממוצע מתוך ${quizTotal} מענים</span>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl p-6 border border-slate-800 space-y-4">
                        <h3 class="font-bold text-white text-base">הערכות סופיות למעבר המבחן:</h3>
                        <div class="space-y-3 text-xs md:text-sm text-slate-300">
                            <p class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${inlineMastered >= 8 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>שליטה תיאורטית: <strong>${inlineMastered >= 8 ? 'מעולה' : 'נדרש פתרון של עוד בחנים מהירים בגוף החומר'}</strong></span>
                            </p>
                            <p class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${flashcardMastered >= 12 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>שינון מושגי יסוד: <strong>${flashcardMastered >= 12 ? 'מוכן למבחן' : 'עבור שוב על כרטיסיות השינון שסומנו לחזרה'}</strong></span>
                            </p>
                            <p class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${quizCorrect >= 6 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                                <span>יכולת ניתוח קייסים: <strong>${quizCorrect >= 6 ? 'טובה מאוד' : 'פתור את סימולטור התרחישים וערוך השוואה קפדנית למחווני הניקוד'}</strong></span>
                            </p>
                        </div>
                        
                        <div class="border-t border-slate-800/80 pt-4 flex justify-between">
                            <button onclick="resetAllStudyState()" class="px-3.5 py-2 rounded-lg bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 text-rose-400 text-xs font-bold transition">
                                אפס את כל נתוני הלמידה
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function resetAllStudyState() {
            if (confirm('האם אתה בטוח שברצונך לאפס לחלוטין את כל התקדמות הלמידה שלך (בחנים, כרטיסיות, סימולטור)?')) {
                localStorage.clear();
                masteredCheckpoints = {};
                cardMasteredState = {};
                quizAnswers = {};
                currentCardIndex = 0;
                currentQuizIndex = 0;
                currentOpenIndex = 0;
                
                updateHUD();
                renderCurrentView();
                showToast('כל ההתקדמות אופסה בהצלחה');
            }
        }
    </script>

    <!-- Sound & Toast Systems -->
    <script>
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('sound-on-svg').classList.toggle('hidden', isMuted);
            document.getElementById('sound-off-svg').classList.toggle('hidden', !isMuted);
            showToast(isMuted ? 'הסאונד הושתק' : 'הסאונד הופעל');
        }

        function playChimeSound() {
            if (isMuted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15); // A5
                
                gain.gain.setValueAtTime(0.25, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.log("Audio blocking", e);
            }
        }

        function showToast(msg) {
            const bar = document.getElementById('toast-bar');
            bar.innerText = msg;
            bar.classList.remove('translate-y-10', 'opacity-0');
            
            setTimeout(() => {
                bar.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }
    </script>

    <!-- POMODORO TIMER SYSTEM -->
    <script>
        let timerSec = 3000;
        let timerMax = 3000;
        let timerMode = 'study';
        let timerRunning = false;
        let timerInt = null;

        function updateTimerUI() {
            const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
            const s = (timerSec % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').innerText = `${m}:${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-play-btn');
            if (timerRunning) {
                clearInterval(timerInt);
                timerRunning = false;
                btn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                    <span>הפעל</span>
                `;
                showToast('הטיימר הושהה');
            } else {
                timerRunning = true;
                btn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>השהה</span>
                `;
                showToast('הטיימר הופעל');
                
                timerInt = setInterval(() => {
                    if (timerSec > 0) {
                        timerSec--;
                        updateTimerUI();
                    } else {
                        clearInterval(timerInt);
                        timerRunning = false;
                        playChimeSound();
                        showToast('סבב פומודורו הושלם בהצלחה!');
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInt);
            timerRunning = false;
            timerSec = timerMax;
            updateTimerUI();
            
            const btn = document.getElementById('timer-play-btn');
            btn.innerHTML = `
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                <span>הפעל</span>
            `;
        }

        updateTimerUI();
    </script>
</body>
